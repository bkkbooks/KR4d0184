body:
  text: 和靖集卷五宋尹焞撰師説上中庸曰人莫不飲食也鮮能知味也時敏他日問進德之序先生曰進德須忠信忠不欺信不詐不詐不欺故可入德昔夫子蓋嘗以主忠信告子張矣易曰忠信所以進德也先生每與時敏講書必具衣冠或深衣講畢則曰盡誠及物者我也誠之者其在子乎或引吕與叔中庸後曰諸君有意今日之講猶有望焉無意則不肖自為譊譊無益不幾於侮聖言者乎先生曰學者切不可以富貴為大事富貴倘來之物才役心於此則不可為學矣先生曰學者須是誠須是敬敬則誠矣故易曰君子敬以直內若色厲內荏譬諸小人其猶穿窬之類也歟先生曰君子之為學問欲切思欲近若泛問而逺思豈有所得哉雖子夏之言實有可取先生曰學者不可無師友師道嚴須是友觀易兌卦全説朋友公且看樊遲問仁孔子告以愛人問知告以知人孔子竭始終言之當時樊遲無所進故又告以舉直錯諸枉能使枉者直遲復無所進及退而見子夏子夏且以舜湯之事言之然後釋然不復問朋友之得可謂多矣因言某昔從伊川問不切只是不答若要切切偲偲是朋友先生曰孔孟之門所以有大過人者只是盡誠公且看孔子間居閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂所樂者蓋樂四子略無偽飾至子路終不得其死則見於行行其有偽乎先生曰孔孟門第更無隱情有疑便問且如短喪學稼樊遲宰我豈不知是小人不仁之事蓋心有疑不得不問若不問則終於自信矣又如公孫丑問孟子夫子當路於齊管仲晏子之功可復許乎孟子乃所願則學孔子丑豈不知亦見管晏之功大故舉而比之得孟子一言之後方知孟子之志在於道而不在於功後之人有所進益亦公孫丑之力也先生曰某在經筵進論語解别無可取只一篇序却是某意曰學貴力行不貴空言若欲意義新竒文辭華贍則非臣所知此是某意時敏欲學讀孟子問曰孟子不知誰解得好先生曰無出趙氏公且看趙氏注因曰某被旨解孟子孟子逐段自説分明今更不復解但與逐段作一説提其要而已先生曰孟子稱惟仁者為能以大事小惟知者為能以小事大兩句若不相干數日後復申前説時敏曰莫是仁智自此可見以吾之大事彼之小非仁者不能蓋勢雖可為而不忍為此所謂樂天以小事大但勢不敵勉事之而已所謂知者知之也故曰畏天先生曰是也王伯之分於此可見先生曰孟子之書讀來讀去不覺快活時敏問如何先生曰公且看關一也古為關以禦暴今為關以為暴為暴大段不干事先生曰明道説萬取千千取百最好齊語謂某處取某處逺近先生曰孟子浩然之氣若非公孫丑之問終不發出來丑可謂有功矣時敏問周公須得兼三王如何先生曰此聖人之功也吕紫微書問配義與道道義如何分先生曰道是總名義則見於事時敏問許大伊尹孟子只看一箇任字與之恐不足以盡伊尹先生曰不然孟子説話字字要稱停賢看他在畎畝時只知以堯舜之道自任及幡然而起則以天下自任故曰匹夫匹婦有不與被堯舜之澤若已推而納之溝中非任而何先生曰孟子説話字字稱停不肯妄與如曰子路人告以有過則喜禹聞善言則拜大舜有大焉善與人同舍已從人喜與拜固自不同况能舍已從人其氣象又大矣非孟子誰識之先生曰孟子大段好文字時敏請益先生曰孟子只要説箇為政不因先王之道可謂智乎直自離婁之明説來三代以後那有這文字時敏問責難如何是恭陳善閉邪如何是敬先生曰敬主內言陳不陳在我恭主外言聽不聽在君在我者不可不敬在君則當致恭而已故孔子言九思事思敬貌思恭孟子亦曰我非堯舜之道不陳莫如我敬王也先生曰讀書要識賢者氣象樂正子便自與孟子不同魯平公將見孟子嬖人臧倉沮之樂正子未免言焉孟子便别曰吾之不遇天也臧氏之子焉能使豫不遇正與公伯寮訴子路意同時敏問養生何故不足當大事惟送死可以當大事先生曰父母之生好惡取捨猶有言焉孝子則順其志而已可也故未足以當大事及其亡也子無所請親無所言好惡取捨子之心親之心始足盡其事而已故曰惟送死可以當大事時敏問告子生之謂性如何先生曰生之謂性説得自是白玉白羽白雪其白一也只是被孟子以牛之性人之性為問便錯了倒了只是內不明時敏問易傳解知至至之知終終之引始終條理其義何如先生曰此一段孟子别解得分明曰始條理者知之事也故譬則巧今人運用智巧以求合乎事意者皆是矣至於終條理者須是聖人之事也故譬則力智巧不侔焉易曰可與幾者便是智之事也可與存義者便是聖之事也孟子尚慮人未曉直以射譬之曰其至者雖爾力量之所及其中則非力也用巧而已三子自巧至聖皆得一偏若孔子則集大成矣故集大成孟子指為孔子而言所謂集者非取諸三子也先生曰掘井九仞而不及泉猶為棄井也此孟子説盡井卦孰謂孟子尤長於詩書要看易先讀孟子一遍先生曰操則存舍則亡出入無時莫知其鄉此孟子説心非説性也先生曰德夀問某紂亦是君孟子何故謂之一夫某曰此非孟子之言上曰誰言曰此武王誓師之辭也獨夫紂洪惟作威上又曰君視臣如土芥則臣亦便可視君如寇仇某曰此亦非孟子之言上曰誰言曰此三代之民言也撫我則后虐我則讐上大喜他日謂趙丞相曰朕嘗以此問張九成九成曰才不為君便是獨夫若尹某可謂明矣若九成殊不曉他意先生謂時敏曰齊宣王問湯武之事有諸孟子對以一夫蓋以警當時時君若土芥一段孟子告齊宣之語此告字當如書入告爾后之告同言君臣義合報施之道必爾亦所以深曉時君也時敏因侍坐語及孟子先生曰近來看得如何對曰數日看得無為其所不為無欲其所不欲先生大聲曰如斯而已矣既而曰盡得此便是聖人時敏請論語先生曰須莊敬見得如弟子之問孔子之答又見得弟子之言與孔子之言亦自有輕重因曰某昔在伊川席下一日問某曰賢看論語如何某曰看論語句句是實伊川曰善自涵養先生曰某一日侍坐於伊川請曰某看曽子三省誠而已伊川曰不意賢看到此緊要處紫微吕公領子文同問學於先生曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文吕即令文起拜而書之紳時敏侍坐有蚵蚾出於籬下先生指之曰天地之間無物不養此雖細微在所不棄因曰某往年在伊川席下張思叔亦在某問先生人不可以無一箇量先生曰賢要量如何大某曰須是如江河大先生曰聖人之量有甚窮盡某曰先生何以見其無窮盡先生曰於孔子見之事君盡禮人以為諂也若他人須著一箇小人字賢且看聖人之量如何大時敏問三年無改於父之道可謂孝矣如其道終身無改可也如其非道何待三年先生曰喪不過三年示民有終也三年則天時一變先王制禮設為中制使知者不敢過不肖者不敢不及三年無改孝子之心有所不忍故也曰鯀則殛死禹乃嗣興則改之何速也先生久之曰賢讀書不子細鯀九載績用不成堯誅之堯崩三年喪畢舜始命禹以平水土何止三年時敏歸以語吕文吕曰子細二字極好故吕教人必以子細先生教人全在涵養時敏問有子曰禮之用和為貴一段望先生埀教先生曰賢且讀教句法分明曰禮之用是一句以和為貴故先王之道斯為美小大由之言君子小人皆得行此以和為重也却有所不行者知和矣不以禮節之亦不可行者要以禮為重也大抵讀書須是句法分明下一字重時敏問有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也此好字欲如仁者能好人之好同如何先生曰不須如此説只是孝弟順德也順德自無犯上况作亂乎省試出克己復禮為仁論恭詳朱希直來問一日克已復禮如何天下歸仁先生曰天下那有兩箇道理孟子曰萬物皆備於我矣反身而誠樂莫大焉到那誠處天下自然歸仁朱退時敏問如何誠處便天下歸仁先生曰孔子只説仁不説誠子思孟子説出誠來故曰誠者天之道也又曰誠者物之終始不誠無物到那誠處便是仁天下安能外此哉故曰歸仁先生曰語云三分天下有其二以服事殷周之德可謂至德也已矣此一段極好玩味且周自稷封邰至大王自邠遷岐其時已自為西伯文王受命之祖三分天下有二非取諸殷也非取諸殷而以三分有二之天下不失臣節此所以為至德也歟又如舜白手將一箇天下與禹兩聖人氣象如何地大故曰舜文若合符節時敏問子在川上一段先儒有以死生為言者其説如何先生曰不如此某嘗以此問伊川伊川曰此蓋形容道之體也天運而不已日往則月來寒往則暑來水流而不息物生而不窮可窺而易見者莫如川君子法之自強不息及其至也純亦不已某亦引解在第九篇先生謂時敏曰賢在此飲食恐粗糲時敏起謝曰時敏田家子本無食祿分今來分先生祿食大段僣越豈問粗糲先生笑曰士志於道而恥惡衣惡食者未足與議也今士大夫好事治飲食所謂養其小體為小人因目其左右云先生曰君子喻於義小人喻於利惟其喻之是以好之時敏問子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也且夫子之文章未嘗言子貢則曰可得而聞性與天道夫子既言之則曰不可得而聞也且性與天道如何分先生曰如何分得子思曰天命之謂性則合天人而言耳蓋子貢於此始有所得既曰文章可得而易言矣故曰聞也性天道非如文章可得而易言所謂言者如曰言夫子之於性與天道云耳故曰不可得而聞也時敏問子見南子子路何故不悅先生曰昔在洛沈元用亦以此問某曰聖人所為賢人自不識子路在當時已疑况公生千載之後自是疑也沈曰使先生見南子否曰某不敢見沈曰何故曰待其磨不磷涅不緇雖佛肸召亦往况南子乎沈曰某七年之疑今日頓釋某曰未也離此去却又疑因謂時敏曰南子非正而靈公以為夫人使見夫子夫子雖不欲見安能拒之子路以夫子為彼強也故不悅夫子為陳不得已之故若道之否塞蓋天厭之易曰見惡人無咎象曰見惡人以避咎也時敏問葉公問孔子於子路何故不對莫是子路誚葉公有許大夫子而不知故不對歟曰非也亦夫子難於形容賢且看夫子自道不過曰發憤忘食樂以忘憂而已發憤忘食知之事也樂以忘憂仁之事也仁且智夫子聖矣乎若常人不過誇大而已有新第人來見先生退先生為時敏講論語第七篇吕憲又送改官文字邢叔端舉家甚喜先生曰人心固不足秀才望得解得解望及第緑衫望緋衫緋衫望紫衫何時是已此所謂小人長戚戚因曰前輩各别歐陽公及第後棄其所業與伯祖師魯習古文近來如謝顯道楊中立皆因及第後來隨伊川時敏歸語吕文吕曰先生長者説話有益某祖父侍講在家亦有新第人來見是親戚不欲言其名久之曰某待將三經新義編成門類以便學者侍講曰公更待應舉耶其人大慚和靖集卷五
