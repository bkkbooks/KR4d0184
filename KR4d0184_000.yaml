body:
  text: 和靖集目録别集類三宋卷一奏劄上卷二奏劄下卷三詩雜文書卷四壁帖卷五師說上卷六師說中卷七師說下卷八年譜臣等謹案和靖集八卷宋徽猷閣待制河南尹焞撰焞字彥明年十二應進士舉䇿問議誅元祐黨籍不對而出靖康初賜號和靖處士後以范冲張浚薦入經筵列侍從旋乞致仕集凡八卷首列奏劄二卷次詩文一卷次壁帖一卷是其手書聖賢治氣飬心之要帖之屋壁以自警惕又次師說三卷則其門人王時敏編輯末附年譜為第八卷朱子語録謂焞文字其有關朝廷者多門人代作今亦不可復考然指授㸃定亦必焞所自為亦猶㑹昌一品集序雖李商隱作究以鄭亞改本為勝正不必盡自己出也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d452cfbd7b3c6ce6067f593a7e14eb5af3e33e5dc5852cd3017802011f4162df
