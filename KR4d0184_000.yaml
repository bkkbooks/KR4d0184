body:
  text: 和靖集目録别集類三宋卷一奏劄上卷二奏劄下卷三詩雜文書卷四壁帖卷五師説上卷六師説中卷七師説下卷八年譜臣等謹案和靖集八卷宋徽猷閣待制河南尹焞撰焞字彥明年十二應進士舉䇿問議誅元祐黨籍不對而出靖康初賜號和靖處士後以范沖張浚薦入經筵列侍從旋乞致仕集凡八卷首列奏劄二卷次詩文一卷次壁帖一卷是其手書聖賢治氣飬心之要帖之屋壁以自警惕又次師説三卷則其門人王時敏編輯末附年譜為第八卷朱子語録謂焞文字其有關朝廷者多門人代作今亦不可復考然指授點定亦必焞所自為亦猶會昌一品集序雖李商隱作究以鄭亞改本為勝正不必盡自己出也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1b0614febeca5626215a71ded2d14c90d4cd48b1ff43a9e704b00776c48abbad
