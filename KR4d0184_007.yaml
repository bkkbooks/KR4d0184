body:
  text: 和靖集卷七宋尹焞撰師說下先生曰某舊在涪陵千佛寺居扁坐處曰三畏齊至此復取舊額扁坐榻之前聊以自警後因看人編伊川師說說三畏處曰畏天命不負所畀付畏大人亦以自畏畏聖人之言以自進德也某不覺愧於中者纍日蓋平日以是名齊自謂有深得且如畏聖人之言只是謂道之所在而已又何嘗推得到此乃知伊川凡語言必推用於己自此亦當少戒輕為人解釋聖言也又曰畏大人時且如端莊而坐亦所以自畏也時敏問語曰是知津矣先儒以謂長沮譏孔子而言時敏意謂二人耦而耕曰是知津也作指桀溺而說如何先生曰不須如此說大抵學問不在新竒全在涵養以養其氣質而已時敏問論語自第十八篇皆門人追記孔子之論辨門人之優劣十九篇皆門人自述其所記聞故無孔子之辭至二十篇則孔子平日所論二帝三王之道孔子沒門人并記之是否先生曰候更思之竟不得再請先生曰某昔在伊川席下有學者來問六十四卦以某觀之皆不須得只乾坤足矣伊川曰要去誰分上使其人曰聖人分上使伊川曰聖人分上一字也不須得先生曰文中子亦好看如薛收問易子遊孔子之廟子讃易至序卦曰大哉時之相生也達者可與幾矣至雜卦曰旁行而不流守者可與存義矣又曰名實相生利用相成是非相明去就相安某皆帖之壁非後人所及也先生曰文中子儘勝荀子荀子性尚不識如曰養心莫善於誠不知誠是何物孟子寡欲之言盡之矣宜乎退之言軻死不得其傳蓋有所據云先生愛潔淨地有汙穢必去之嘗說某只有這些克不去時敏問孔子告顔子克己復禮若非禮之視聽言動亦須如此克耶先生曰是也因言伊川亦如此一領黃衲道服至破亦潔淨嘗曰衣不欲異欲其潔食不欲異欲其精先生曰學者須是勇勇則必有所為孔子曰德之不修學之不講聞義不能徙不善不能改是吾憂也憂之如何為無勇也易之象曰雷在天上大壯君子以非禮勿履非禮勿履不是大壯之人其果能哉先生曰讀聖人之書須是有所自得且如論孟從小知是孔子孟子之書不敢說爾非真知也要如不知有孔孟而知為孔孟之說乃所謂真知耳先生嘗書數句說易曰易之道如日星但患於理未精失於機會則暗於理者也聖人復生恐不易吾之言祁寬問之先生曰吾看易運數也故有是說正在未到泰之上六便要知泰之將極未到否之上九便要知否之欲傾也時敏問伊川語録載人問鳶飛戾天魚躍于淵答曰會得時活潑潑地會不得時只是弄精魂不知當時曽有此語否先生曰便是學者不善紀録伊川教人其不甚曉者多以常言俗語引之人便記了此兩句某嘗問莫只是順理伊川曰到此吾人只得㸃頭今不成書先生教我㸃頭因曰在蜀中有師說出某嘗作一小序云焞年二十始登師門被教誘諄諄垂二十年昔得朱公掞所編雜說呈先生此書可觀否先生留半月一日請曰前所留雜說如何先生曰某在何必觀此若不得某心只是記得他意豈不有差避冦來蜀得數本切觀之其間或詳或略因所問而答之蓋學者所見有淺深故所記有工拙未能無失不敢改易然雖未盡識其意以所見無疑者輒成此書自為師說覽者各自得焉不能詳告也紹興六年四月一日門人尹焞記時敏問曰君子不施其親先生曰親者無失其為親故不待乎施也先生曰乾坤成列而易位乎其中矣聖人便是易時敏看易至井卦先生曰吾人今日當且做第四爻工夫曰修井也時敏問印行有四先生中庸明道集載先生不曽講經此中庸誰解之也先生曰乃吕與叔經筵所解後來刪修不用者人取以為明道甚可怪也先生曰伊川說中庸曰致中和天地位焉萬物育焉一箇致字非聖人誰能道先生曰考槃橫渠以為小人之詩則非伊川與某人說得最好蓋賢者自歎之辭曰永逝矣弗得過君之朝矣先生曰十畝之間伊川亦不要如此說先儒謂國削小民無所居國雖削小民何至無所居耶此蓋魏人見鄰國十畝之桑者間間然因相約而去曰行與子還兮行與子逝兮故下篇又有適彼樂國樂郊之語時敏侍先生間坐聞寺中木魚聲顧時敏曰寺中打木魚何意時敏對曰嘗有小說石滕和尚言物死目皆瞑惟魚死不瞑以言定也先生笑曰雖小道亦有可觀又曰古人以魚喻民今品數到者必佩之蓋不忘恤民之意耳邢叔端一日歸謂先生曰府中諸公謂先生官已四品雖小衫自當用紅鞓帶先生笑曰某已致仕自是無官何用此為皂帶不足又要紅鞓紅鞓不足又要兼金孟子曰人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中心一而已移來移去至於熱中則無不為矣先生病革見時敏問曰近看甚書答以先生病每日只與德元同候安否亦無暇看書先生曰不可有疑便問病亦不妨疑處更與德元商量德元相隨亦久想不至錯又曰人心須常有所事孟子曰必有事焉是矣孔子曰七十而從心便繼以所欲不踰矩無暇一句不幾於放心歟吕德元請先生遺表先生曰某一部孟子便是遺表德元請先生孟子先生曰孟子也未成全書尚有第三篇及第十四篇某章未備公等將去修之時敏與德元皆泣德元曰稽中等愚陋豈敢修先生書朝廷幸來取當以藁進耳先生首肯之先生未啓手足前一月高抑崇執弟子禮來見先生辭以疾先生無後時敏與德元定鎮為後師魯之後故抑崇挽詩云七日夢楹還有後三年築室恨無從先生死時敏與德元疑所服作書問抑崇以孔子死門人疑所服子貢曰昔夫子之喪顔淵若喪子而無服請喪夫子若喪父而無服又曰孔子之喪二三子皆絰而出羣居則絰出則否先儒謂弔服而加麻去古既逺所謂弔服不知何服也近世士大夫皆以皂衫單帶幞頭為弔服然羔裘元冠其可弔也耶若欲無服則不近人情若欲加絰則無古制今和靖不幸時敏等不肖情禮實有未安吾丈博古必有所見願推以教萬一高答書亦不過禮從宜而已先生沒朝廷賜三百匹兩以葬時敏等門人列狀回納紹興十三年正月中旬門人王時敏編師說附録馮忠恕曰先生學聖人之學者也聖人所言吾當言也聖人所為吾當為也詞章云乎哉其要有三一曰玩味諷味言辭研索歸趣以求聖賢用心之精微二曰涵養涵泳自得藴蓄不撓存養氣質成就充實至於剛大然後為得也三曰踐履不徒謂其空言要須見之行事躬行之實施於日用形於動靜語默開物成務之際不離此道所謂修學如此而已所謂讀書如此而已記善録序祁寬問如何是主一願先生善諭公言敬有甚形影只收斂身心便是主一且如人到神祠中致敬時其心收斂更不著得毫髮事非主一而何明道嘗曰天下事只是感與應耳公初聞之以問伊川伊川曰此事甚大當自識之公曰綏之斯來動之斯和是亦感與應乎曰然嘗請益於伊川曰某謂動靜一理伊川曰試喻之適聞鐘聲某曰譬如鐘未撞時聲固在也伊川喜曰且更涵養溫州鮑若雨與鄉人十輩久從伊川伊川遣之見和靖次日伊川曰諸人謂子靳學不以教渠果否公曰某以諸公來伊川先生之門受學某豈敢輒為他說萬一有差便不誤他一生伊川頷之公與張繹同時師事伊川張繹以高識公以篤行俱為所稱伊川問公與繹尋常見處有同否有差否自覺如何為我言之公曰某不逮思叔如凡請問未達三四請益尚有未得處久之乃得如思叔則先生才說便㸃頭會意往往造妙某雖愚鈍自保守得若思叔則某未敢保他伊川笑曰也是也是自是每同請益退伊川必謂諸郎曰張秀才如此不待尹秀才肯得祁筧所語録公言某與思叔既相友善伊川歸自涪思叔始見穎悟疏通伊川亦便喜之自此同逰處伊川以族女妻之甚相敬待和靖嘗因侍坐禀伊川曰張某每聞先生語言下解悟某聞先生語須再三尋思或更請問然後解悟然他日持守思叔恐不及某先生以為然思叔長於為文又善辦事先生沒未幾思叔亦沒和靖被召嘗曰思叔若在到今自當召用必能有為於世伊川嘗言晚得二士記善録先生嘗言學者所以學為人也徐名度字惇立尹門人問曰某有意於學而未知所以為問先生曰此語自好若果有此意歸而求之有餘師又語人曰放教虛間自然見道先生在從班時朝士迎天竺觀音於郊外先生與往有問何以迎觀音也先生曰衆人皆迎某安敢違衆又問曰然則拜乎曰固將拜也問者曰不得已而拜之與抑誠拜也曰彼亦賢者也見賢斯誠敬而拜之矣徐度語及蘇氏使民戰栗義問曰如何先生艴然曰訓經而欲新竒無所不至矣先生日看光明經一部有問之曰母命不敢違朱子云如此便是平日闕却諭父母於道一節便致得如此和靖言經雖以誦說而傳亦以講解而陋此言深有味也和靖集卷七
