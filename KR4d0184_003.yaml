body:
  text: 和靖集卷三宋尹焞撰詩亡姑墓銘詩嗟夫人之生兮一氣凝乎混茫變而之死兮去不知其何鄊唯懿德之在人兮愈久而不忘歸安此室兮其千萬年無壞傷過种明逸故居題絶句少年亡意學經綸老矣空餘此一身靣似髑髏頭似雪却來巖谷繼前塵自秦入蜀道中絶句三首緑隂深處竹籬遮也有紅花映白花却憶故鄊卿相第不及張三李四家曉來雨過槐隂潤午霽風搖麥浪寒自愧此身徒擾擾未知何處可偷安南枝北枝春事休啼鶯乳燕也含愁朝來回首頻惆悵身過秦川最盡頭避賊至商山絶句西來幾被雪霜埋鴻雁嗷嗷莫强猜今朝始踏商山路高視浮雲任去來雜文進論語狀孔子以來道學屢絶言語文字去本益賖是以先聖遺書雖以講誦而傳或以解說而陋况其所論所趨不無差謬豈惟無益害有甚焉脫使窮其根本謹其辭說茍不踐行等為虛語此先聖所以重講解甚言辭也况如臣者材質甚愚修為無取施之於已未見其功資以事君亦將何有其於聖賢言行何足以窺測奧妙發明指歸强顔為之第塞詔㫖臣無任慚羞恐懼之至論語解序臣自布衣入侍經筵被㫖解論語以進臣職備勸講不敢以寡陋辭竊惟是書乃集記孔子嘉言善行茍能即其問答如此親炙於聖人之門然默識心受而躬行之則可謂善學矣後之解其文義者數十百家俾臣復措說其下亦不過稱贊而已恭惟陛下聖學高明出乎天縱如舜好問如湯日新舉賢而逺不仁修已以安百姓固以合符乎夫子之道施之於事業矣復何有待於臣之說然而學貴於力行不貴空言若欲意義新竒文辭華贍則非臣所知也姑托所聞以稱明詔臣謹上題論語解後焞紹興七年十一月被召到闕賜對押赴經筵承續講說論語衛靈公之末一章次日有㫖給筆札解論語以進念以說書為職不敢以固陋辭方以病困殆䝉賜寬假病安日解進明年二月駕還錢塘焞以病從百司先行三月病少愈力疾日赴經筵是月十三日詔促成書以進時手顫目昏心思荒錯深懼稽命之久遂勉强為之姑塞上命四月二十一日進至而學者祁寬吕稽中堅中在焉書成皆三子之助也九年春復病丐歸䝉恩授以間祿聽其自便遂寓居平江府虎丘寺之西菴寬從余居上方暇日見此秩云當時潜録欲終身誦之甚矣其嗜學也相從既久若是書也講亦熟矣豈不知此一時應詔而成皆前人成說雖有一二臆見坐以老病拙訥心之精微詞不能達今取觀之徒有愧汗先聖不云乎吾無行不與二三子者是丘也焞於諸公亦然何用此為寬復請藏之因識始末併戒其勿以示人幸諒區區之意冬至後一日書於三畏齊書易傳後序焞至閬中求易傳得上十卦於吕稽中實余門生也後至武信壻邢純多方求獲全本以所收紙借筆吏成其書為生日之禮殆與世俗相祝者異矣敬而受之乃言曰誓畢此生當竭吾才不負吾夫子傳道之意壬子七月二十五日門人尹焞書師說序焞年二十始登先生之門被教誘諄諄垂二十年昔得朱公掞所編雜說呈先生此書可觀否先生留半月一日請曰前日所呈雜說如何先生曰某在何必觀此若不得某心只是記得他意豈不有差經兵火來蜀中得數本竊觀之其間或詳或略因所問而答之蓋學者所見有淺深故所記有工拙未能無失不敢改易焞雖未盡識其意以所見無疑者輒成此書目為師說覽者各自得焉不能詳告也紹興六年四月二十一日門人尹焞記跋西銘橫渠先生作此銘或疑同於墨氏之兼愛寓書以問伊川先生答曰西銘之為書推理以存義擴前聖所未發與孟子性善養氣之論同功二者亦前聖所未發豈墨氏之比哉西銘明理一而分殊墨子則二本而無分老幼及人理一也愛無差等二本也分殊之蔽私勝而失仁無分之罪兼愛而無義分立而推理一以止私勝之流仁之方也無别而迷兼愛至於無父之極義之賊也子比而同之過矣且謂言體而不及用彼欲推而行之本為用也反為不及不亦異乎題伊川先生語録焞登先生之門後五年見劉唐詢通直出示朱公掞給事所編先生雜說焞欣然受之録呈曰此書可觀否先生留半月復請曰所留雜說何如先生曰某在何必看此書若不得某之心只是記得他意豈不有差焞後更不敢復讀兵火之餘偶至蜀中見人人成編蓋所見有淺深故所記有工拙細觀之則失其意者不暇一一言也焞侍坐先生誨之曰夫子沒而微言絶七十子死而大義乖信然今日道學絶講親炙者無幾則迷妄失真亦固多矣可不哀哉如世傳史評之類皆非先生所著寓九江夏庭列惠然見訪語此道輒書以志之紹興七年四月二十八日門人河南尹焞書題伊川先生像焞至蜀纍年見伊川先生盡像數本最得其真然則望之儼然即之也溫殆非畫工所能傳也學生祁寬好學守道欲刋諸石以傳久逺其志益可佳矣門人河南尹焞題題蜀本周易後易之道如日星但患於理未精失於機會則暗於理者也聖人復生恐不易我之言書伊川先生修禊序帖陳公廙豫之舅氏也元豐戊午卜居於洛後一年為此會少年常至其處時先生在會中有此文黃循聖以此佳紙見示遂為之書紹興九年十月七日平江虎丘西菴三畏齊洛陽尹焞書題溫公莊子節帖焞少年居鄉里文正溫公來謁叔父諱材得侍立左右今觀其書用筆端正揚子雲云書心畫也寧不信然紹興十二年暮春晦月河南尹焞謹題跋馮聖先墓志余友聖先每至洛見先生多同處以講此道也焞貧居杜門未嘗一到汝晦其子忠恕好學樂道丙午秋九月焞被召赴闕忠恕相訪不暇欵語兵火之餘奔竄來涪陵再獲與其子會聚遂録此銘見遺時紹興四年十二月望日偶書此以志歲月云又東臯處士馮聖先余同門之友也汝洛相去甚逺聖先至必同處講學忘鑽仰之勞不幸早世莫見施設澗上文人陳叔易以文辭翰墨為一時之妙述君懿行深有餘意焞之言不足為重輕其子忠恕欲題其末以信來世謹書此用慰孝心非敢為助也紹興六年秋八月十有八日洛陽尹焞題前所題藏之於其家後所題以授忠恕跋馮聖先詩集語焞昔年洛中與聖先相會遂出示佳篇兵火之餘至涪陵與其子忠恕相會遂得遍觀亦可見其志之所存也感歎之餘以識歲月紹興六年重陽日千福院三畏齊洛陽尹焞謹題告伊川先生祠文維紹興六年歲次丙辰九月丙寅朔二十有五日庚寅門人和靖處士尹焞詣伊川先生侍講祠而告曰焞甲寅孟秋始居涪陵乙卯孟冬誤辱召命繼下除書實嗣講事人微望輕敢紹前躅辭不獲命勉赴行朝有補於世則未也不辱師門則有之今兹啓行惟先生有以鑒之謹告書遺書右焞啓其生也榮辱在大夫之後得正而斃庶乎君子之歸敢陳將死之言以告終天之别伏念焞曩由羈旅經涉亂離竊希先哲之風不改陋巷之樂晚而有遇遽陪侍橐之聨病不能朝獲遂賜骸之請念始終進退之禮繄生成坱圠之恩無復更生遂為永訣伏望平章僕射相公佐佑王室康濟斯民力扶上聖之君亟致中興之業瞻依曷既涕泗無從謹奉遺書布叙伏惟鑒察不宣答王信伯焞頓首啓前月特䝉寵顧以病軀不得欵奉教益為恨繼辱賜書併録示定夫所撰其叔父墓銘顯道書先生易傳後捧領披讀感愧之心有不勝言専使至承惠翰荷眷豫不忘甚幸甚幸焞即此逺依庥庇諸事粗遣腰痛亦減七八不煩過慮曽憲來寓虎邱日獲相見或云可居旬日車馬聞欲來此遂得欵聽益論未間尚冀為斯文自重懇切懇切便還専奉啓起居兼謝下情不周焞頓首再拜録示易傳差誤且據焞所收本寫呈乞檢至更望訂其是非他俟靣議焞再拜焞頓首啓向寓虎丘時䝉寵顧極荷眷豫之勤去秋過高隱辱館待至厚拜别之久日益瞻仰逺承惠問獲聞動靜感慰兼集即日大暑伏惟尊體萬福焞去年冬末來會稽凡事安集不敢有煩逺念末由拜會惟乞為斯文倍加保重以副願望真切謹専附手啓上問不周焞頓首再拜六月二十四日謹空焞再啓自至會稽以退間不修講人事不遇便人故久不得上問必能深察向承教論語二事今已改正或更有未安處有的便無惜貶諭朋友切磨之道廢而不講正賴吾信伯也萬萬留念顒望顒望貴眷各叶吉慶時暑以保愛為祝小姪墺已受恩今年三月得嶽祠亦薄有祿廪僥幸僥幸亦恐知之焞再拜答祁居之焞前年冬末相别兩見改歲衰老日甚幸未昏憒亦不敢虛度時日十二月末到會稽初至稍困人事今即遂安居經夏别無所苦不煩逺念半月前有人傳言在餘杭幹事方怪咫尺無一字見及忽收専問獲聞動靜欣慰可知示諭附來書未嘗得一何也今後非的便不可附書彼此無益故此中未嘗附書者蓋以此也川中諸公未嘗通問馮貫道四月間専遣人至猶題黔州通判銜位向在桐廬見除梁山軍未嘗來行朝傳之者妄也伯世何故尚留枝江缺在何時仲志在廬山有所授未景實來别其兄德元往來過此相聚甚欵不講人事終日相從德元在四明時通書敦智間相見此亦有一二學者相見不保其往恐知之李習之復性書三篇舊亦常讀偶記韓退之與孟簡書云籍湜輩雖屢指教不知果能不叛去否習之亦韓門生也却晚從釋氏無足怪者古人尚如此况今日時去時來果求何事果見何理而望終始不移大難大難居仁時得書見勉倡此道然老拙之職似當然其如力薄何此道如青天白日誰不見之昧者汩以利欲一出一入望知其至多見其無益也吾子勉旃相會未期暑氣尚炎萬萬倍加保重令弟必且在左右不敢致問秉筆揮汗信筆作此言無次叙一讀焚之可也六月二十五日焞書啓上答謝用休書焞頓首拜啓向在行朝逺辱惠問尋亦拜答以致謝懇未審得達聽覽否忽忽三年不獲嗣音想無便而然也季夏極暑伏惟燕居多暇尊候萬福焞已未仲春得請宫祠來居姑蘇虎丘山寺人事廢絶雖欲上狀無從可致未知高明能亮察否年老多病去歲乞致仕䝉恩允許今春初隨壻氏邢純來寓會稽偶虞教授仲琳時見過志學之士也赴仙鄉新任遂専附手啓上問伏幸照察不周焞頓首再拜用休先輩友兄閣下六月二十六日謹空焞䝉録示先生雜說至感至感易傳必有此書先生自為無一字可疑向亦嘗與虞君言之矣向在川中見印行先生文字焞有數百字以辨之未暇録呈思叔祭先生文已收得久矣當時同祭者范棫孟厚焞四人亦恐要知焞再拜焞再拜啓焞處此之樂否虞皆悉之不果縷陳向得請退間甚欲得謀居仙鄉以力薄不能遂適去年夏偶壻氏除此中差遣去彼不逺仍是一路此心終欲一到左右又未知何如人事未易前期也向同來洛中諸兄誰且安處鄊里者後來俊秀繼此學者為誰因有的便切望示諭在洛中時曽有收得先生文字或當時答學者之問者否老兄不憚煩為寄及幸甚幸甚貴聚萬福令嗣幾人相别久矣南北遼逺皆不知聞並乞批諭専托虞公尋訪高隱未得詳悉併冀照亮焞再拜啓得虞教授書知吾友作學録甚慰鄙懷今虞君作教官吾友為録使鄉校知此道者衆何難之不易也虞君鄊論甚美於此道信之極篤每相見多言及此但恨未能盡所欲言見而知之與聞而知之氣味未可據道在吾友尤宜勉不妄不妄焞再拜上和靖集卷三
