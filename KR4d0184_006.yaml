  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0184_WYG_006-1a, image: WYG1136/WYG1136-0041a.png}
body:
  text: 和靖集巻六宋尹焞撰師說中先生既進語解一日徳夀忽謂趙丞相曰朕㸔尹某日間所行全是一部論語趙曰陛下可謂知人矣徳夀問先生卿如何養得如此粹厚先生曰臣但一生不敢作過上笑之汪聖錫亦甞舉此先生為時敏說中庸至居下位不悅於上民不可得而治也至不誠未有能動者也拱手曰孟子所得於曽子者一言以蔽之曰誠而已今孟子全取此一段載於其書但改誠之者一字為思誠而已其本在於曽子之三省與夫一唯而已可謂學問源流逺有端緒不失其正也如此先生甞寫横渠數語於壁曰益物必誠如天之生物日進日息自益必誠如川之方至日増日得施之妄學之不勤欲自益且益人難矣哉易益長裕而不設設謂虚設信夫銘諸牖以自訟年月日某謹書顧時敏曰横渠之學可謂勤矣其心不閑先生甞寫言滿天下無過口行滿天下無怨惡兩句帖之坐隅顧謂時敏曰某寫此兩句也有来道好者也有愛其字而乞去者不知知某意否時敏問先生之意如何先生曰某意在此兩句未能得到賢且㸔從不敢上做来做来做去做到無擇地位自然滿天下而無過時敏再請益曰前有非先王之法服至說言行則不言服及終則又曰三者備矣豈言行無盡服則不可加益歟曰不然天子以徳言諸侯以位言卿大夫以服言士以行言庶人則以利言此其大畧服至於卿大夫則有降而無益益則是王故只說言行他日又再書其後曰言行君子之樞機可不慎乎戒之慎之日慎一日造次顛沛常在於斯月日某謹書先生曰某舊在洛赴試試官出中於事君論某謂朋舊若出一箇終於立身最難做時敏問如何先生曰孔子却不說終於事君而曰終於立身盖立身最難孟子曰事孰為大事親為大守孰為大守身為大不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也故曰終於立身時敏問事父母孝如何便能事天明事地察明察如何先生曰天地一也尊卑之辨不得不爾天地萬物之父母也父母人子之天地也那有兩箇道理故事父母孝則自然明察乎事天地之理察審而已舜明庶物察人倫是也賢於此上更宜涵養教分明時敏問身體髪膚孝之始也立身行道孝之終也孝道終始於此盡矣又曰始於事親中於事君終於立身前二而後三且立身行道非中於事君之謂耶先生曰前二者言孝道之終始不出乎行此三者言行孝之道不免有始中終之序墨子二本所以顛倒吕紫微書問釋氏生死輪廽之說先生謂時敏曰居仁泥於生死輪廻某已作書喻之引潮以喻輪廻賢他日見渠作某拜意問渠今世既做了中書舍人後世更要做宰相輪廻之說佛家之愛便宜也未㡬吕再書至云既無輪廻人何苦為善而不為惡先生笑曰只這裏便是私心經曰天地之性人為貴人生天地中其本甚善㡬曽教你為惡作賤他來得之太虚還之太虚我在何處先生有書答吕文問胡春秋與他祖父所問不同辭云某再拜屢承下問所以未能一一拜答者以居仁聰明加之力學何待老拙豈非欲發其狂言乎見詢春秋改用夏時未甞有此說以傳為案經為斷尤背於理徃年侍坐有一說諸經是律春秋是斷未甞以傳為案也昔夏君廷列見訪某甞書數字與之曰若不得某心只是記他意此先生語若非居仁疑何以知其錯誤甚幸甚幸遇荒歉則憂死亡遇患難則生恐怖此乃士大夫之常情愚切以為不然此盖見之未明養之未熟臨事乃爾敢以愚見布左右或以為然毋惜見教某再拜先生作書後謂時敏曰前輩皆以左傳是按春秋是斷如此則是孔子因傳而為經矣孔子却與左丘明一般先生那有此說時敏欲請伊川成編之語先生曰某無之今日所與賢說底話皆平日先生所以教某者公但記取若要㸔雜說不如㸔易傳易傳先生之成書雜說他人之所記因出一紙云某登先生之門後五年見劉唐詢出示朱公掞所編文字雜說欣然受之以呈先生曰此書可觀否先生留半月他日復請曰所留雜說如何先生曰某在何必㸔此書若不得某心只是記得他意豈不有差某後更不敢復請兵火之餘偶至蜀中見人人成編盖所見有淺深故所記有工拙細觀之則失其意者不暇一二言也某侍坐先生誨之曰夫子没而微言絶七十子死而大義乖信然今日道學絶講親炙者無㡬則迷妄失真固亦多矣可不哀哉如世傳史評之類皆非先生所著寓九江夏君廷列恵然見過語及此道輒書以諗之紹興七年四月二十八日門人河南尹焞書十二年五月五日重書以遺王時敏秀才其本今留汪尚書家吕紫微書問先生某祖父侍講甞說伊川矣諸儒解經不合全解謂聖人語言自有人不到去處更經秦火言義豈無所續某於易傳或有所見則隨記之今易傳乃成全書與祖父所聞不同何也先生曰某在先生席下數年後方學易序有七十二家易傳先生初教某或只得㸔一象一爻須說盡諸儒解有未盡處然後始於巾箱中出他所說臨啟手足連封以付張思叔思叔能文者也庶有所潤色明年思叔死其子以歸四明高抑崇今慈谿本是矣今見在據當時所見考校全書與不全書亦未可知時敏問伊川何不解繫辭先生曰洛人亦問及此伊川曰繫辭所以明易古謂之大傳若又解之是屋下架屋某今但於易傳中一引證庶亦盡一隅之舉吕紫微書問伊川退朝納其告勅曰臣本布衣誤䝉聖聽置之講列無補於世今既歸田里亦願只乞布衣為榮今先生亦合乞布衣而歸受四品服致仕與伊川異何也先生謂時敏曰居仁責我則是但某荷聖恩四章不允復賜象簡筆墨茶各一百端硯金絲匣金鼎硯滴各一令講孟子以進書成日賜四品之服當隨此上納會稽有學者欲將伊川語編成門類請先生訂正先生曰某學術淺陋豈能訂正先生之言兼是他人所記某若說是人便信之豈不相誤不如只據見定識者自知其非兼分成門類却是舉業時敏欲學讀詩先生甚喜曰孔子教其子必先以此因舉横渠詩云置心平易始通詩又曰今人躐等纔相見便問易問春秋不知孔子讀易韋編三絶仲尼修經㳺夏一辭不措二經豈易言也若居業某又不曽理會多時賢要㸔詩甚善先生為時敏說詩序畢因曰六經遭秦後可惜燒了多少好文字且如詩序與易繫辭皆須聖人作非後儒可及故讀詩不先之大序猶入室不由戸也讀易不終之繫辭猶飲食不知其味也時敏問大序孔子作小序則誰為之先生曰伊川云國史為之既採此詩必知其人必知其所以刺美之義也今首句是矣下則解師所増如蕩言天下蕩蕩賚言予酌言酌先祖之道與首句全不干事與詩亦不倫故知解師所増無疑先生曰伊川作詩序二篇外人傳之不真某一月請問曽作否伊川曰有之但不欲示人再三請乃曰為子出此二篇今傳之者是也時敏問先生伊川五經皆有解乎先生曰只有易傳他經則分與門人理會俟他時却欲會作一處㸔不期謫涪啟手足時却有中庸解取出燒了曰易傳足矣何以多為先生又曰得他留此書在也好燒了可惜春秋聞分與劉質夫詩書不知分與誰詩序二篇則先生自為之不可不知先生曰某向在伊川席下有學者云關中諸公欲節禮記出㸔伊川曰聖人語言與漢儒甚不同更㡬時某當為之惜乎伊川不及如言而死矣先生到國門有詩二首一云首句闕為儒也道得成名可憐白髪乖前志懶着青衫逐後生一云少蒙師教指迷津老讀羲經味入神無限青山隨意好强來騎馬踏紅塵沈元用欲將易傳逐爻取諸子史一話一言或其人所行有合於此者類而證之先生曰如此則三百八十四爻三百八十四件事爾沈黙然而笑先生經筵講尚書有二典見行至說道則曰道一也豈可分而為二孔安國有大道常道之分則非矣張子韶敬服之曰師門有人矣先生曰孟子說三樂處極好玩味一歸之天二得之已三施之人王天下則果在外也先生甞與時敏言賢欲學文須熟㸔韓文公六月念六日白李生足下一書檢之乃答李翊中云無望其速成無誘於勢利養其根而俟其實加其膏而希其光先生之意在此先生曰詩稱上天之載無聲無臭則曰儀刑文王萬邦作孚中庸之書稱之則曰至矣賢知其意乎時敏曰不知先生曰道有甚窮盡詩為文王作故終之以文王中庸為萬世作故終之以至矣不成上天之載只文王儀刑便了先生曰鄉黨一篇門人弟子寫出一箇聖人之徳容學者當潜心焉因曰中庸自仲尼祖述而下至無聲無臭至矣言孔子之大鄉黨一篇自始至終言孔子之小子思曰天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉詩曰鳶飛戾天魚躍於淵言其上下察也時敏問寢不尸江山徐先生欲作坐如尸之尸解如何曰既有寢衣長一身有半則不寢無舒尸之時矣先生曰不必如此說只是必有寢衣伊川疑上文當連齋而言故曰必有先生讀論語到柴也愚參也魯义手而起曰某平生亦得一箇魯力時敏問善人為邦百年亦可以勝殘去殺此必先民之言夫子引之故曰誠哉是言也先生曰然亦如南人有言夫子引之則曰善夫先生引東坡云孔子未甞輕以仁與人亦未甞輕以仁絶人未甞輕以仁與人故克伐怨欲不行可以為難而已未甞輕以仁絶人故剛毅木訥近仁如此立作却也好做文字時敏問向來鮑商霖問伊川云今之成人者何必然一段是孔子說耶伊川須要作孔子說若作子路說亦自好先生曰賢疑一箇曰字意記語者既說兼此四人之長可以成人矣又不當以曰字起故疑為子路說耶時敏曰非也以文義考之意子路起說盖子路為人見利則思義見危則致命久要則不忘平生之言以為集四子之長則成人大矣故曰今之成人者何必然此子路自道也夫子不答盖有深意先生曰不然四子之長出於徳性三者之事在於致思徳性則自然致思則勉强故曰亦可以為成人矣若曰字則門人記其發語之辭亦如在齊聞韶曰不圖為樂至於斯也不成曰字也是别人說先生曰某向在虎丘一日閑行思量孔子曰其言之不怍則為之也難兩句大有所得時敏問何所得曰言之易行之難今人要做聖賢遮莫說不得臨行一寸也進不成歩皆是不怍先生曰不逆詐不億不信須是先覺者惟賢若不能自明則為人詐而欺矣故大學曰克明徳皆自明也時敏請益先生曰須是問學問學所以明理理明則物莫能蔽故孔子語仲由以六言六蔽皆在於好學先生曰孔子稱無為而治者其舜也歟恭已正南靣而已却是揚子說得好襲堯之爵行堯之道法度彰禮樂著埀拱視天民之阜無為也和靖集巻六
