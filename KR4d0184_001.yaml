body:
  text: 和靖集卷一宋尹焞撰奏劄上諫講和劄子紹興八年冬十一月金人遣張通古為詔諭江南使蕭哲為明威將軍副之且入境朝廷遣起居舍人范同接伴十一月甲申殿中侍御史張戒曰不云國而直云江南是用我太祖待李氏晚年之禮也上章力論之禮部侍郎曾開亦奏謂不當忘仇敵而講和秦檜怒罷曾開職時先生先在告朝廷之議未定金使在館已浹旬朝野遑遑乃上疏曰臣輒罄愚衷上干聖聽退循僣易甘俟誅戮伏念臣本山野陋儒絶意仕宦靖康之難幸脫危辱遭遇陛下逺加聘召不容固辭力疾造朝一歲四遷乞身未從便塵禁近封章八上天聽莫回臣踈愚衰病决難冒處况今金使在廷國家之事臣切意睿謨已定足以懾敵今者浹旬未覩長䇿中外憂憤人心靡寧臣屢欲親叩冕旒少布愚見而臣自十二月十六冒寒暴下謁告卧家雖加藥石至今未愈由是不能勉强祗命覬望清光又慮一旦溘先朝露賫恨九泉辜負陛下眷遇之意臣之區區不敢默已切惟夲朝戎夷之禍亘古未聞中國無人致其猾亂昨者城下之戰詭詐百出二帝北狩皇族播遷宗社之危已絶而續陛下即位以來十有二年雖中原未復仇敵未殄然賴祖宗德澤之厚陛下勤撫之至所以億兆之心無有離二逺近愛戴國勢可保設若人心輕搖豈至今日前年徽宗皇帝寧德皇后崩問遽來莫究不豫之狀天下之人痛心疾首而陛下亦且屈意降志以迎奉梓宫請問諱日為事遂使金志益驕謂我無人乃再啓和議於今日意欲潛圖混一臣妾吾國陛下必為此議則人心日去祖宗積纍之業陛下十二年勤撫之功當决於此矣不識陛下亦嘗徐謀而熟慮乎抑且在廷之臣不以告也臣觀陛下所以不顧衆說力求和好者不過謂梓宫未還父兄宗族在人掌握不知金人之情專尚姦詐金人之求無有紀極坐竭帑藏斂及百姓撼動人心沮喪士氣異時悔之固無及已禮曰父母之讐不與共戴天兄弟之讐不反兵今陛下方將信仇敵之譎詐而覬其肯和以紓目前之急豈不失不共戴天不反兵之義乎又况使人之來以詔諭為名以割地為要欲與陛下抗禮於廷復使陛下北靣其君則是降也非和也今以不共戴天之讐與之和猶且不可况實降乎臣切為陛下痛惜之或以金國內亂懼我襲已故為甘言以緩王師倘或果然尤當訓飭號令申嚴賞罰鼓士卒之心雪社稷之恥尚何和之為務臣願陛下深思熟慮廣採衆論以全大計勿以成算重於改圖則天下幸甚仰惟聖謨默運必使萬全固非臣愚所能窺測然而中外之議局蹐靡寧機事之微生靈所係伏望陛下萬機之暇曲賜睿覽干冒天威罪當萬死貽秦相書先生上疏論和議不報金國人使在館多日議論不决乃貽書時宰秦檜書曰焞比叨除目即以病纒念惟踈愚謬與獻納辭避之請屢上不從方今金使在廷天下憂憤初欲勉强拜命侍清閒之燕盡區區於冕旒之前退見相公論天下之大勢邇來疾病日加兩足寒痺不能自勵以效誠悃前者輒具劄目略陳中外之議今已浹旬未聞朝廷有以待金人之計機會之微間不容髮焞雖昏憒之餘不忍默已相公亦知今日天下之心將失軍旅之心將搖士大夫之氣將喪宗社之計岌岌而危乎主上輟駕南轅十二年矣江淮之間久無竊發豐歉相繼不至流亡更加經理足以自治邉境之防雖未盡善歲竭帑藏使之足食不愛重祿以為信賞將士之心猶知逗遛無功之為恥决戰敢前之相尚朝廷每有以激勵懲勸之可收萬全之效是豈非得人心而然乎今若和於金人彼日益强我日益削中國號令皆從金出國事廢置皆從金命侵尋朘削天下有被髮左袵之禍讒間疑二將帥有誅戮奪權之害姦宄生心大勢奈何將見異時金人坐收成功相公被天下之責無所歸咎願相公榻前力陳大計以謂金人與我有不共戴天之讐靖康以來屢墮其術今若一屈膝使為口實賈怨飭兵自困自斃豈忍直為此議比者切聞主上以父兄未返降志辱身於九重之中有年矣然未聞金人悔過還二帝於沙漠繼之梓宫崩問不詳天下之人痛恨切骨則金人虎狼貪噬之性不言可見天下方將以此望於相公覬有以革其已然豈意為之已甚乎今之上䇿莫如自治自治之要內則進君子而逺小人外則賞當功而罰當罪使主上之孝弟通於神明主上之道德成於安强勿以小智孑義而圖大功不勝幸甚焞病體衰羸日甚一日歸田之請前後八上投老山間側聞作新之政此相公之賜也况天下乎秦檜得書讀之已不樂至勿以小智孑義而圖大功愈不悅及又見先生辭免萬夀觀劄子有云比嘗不揣分守輒及國事識見迂闊已驗於今跡其愚庸豈堪時用秦檜見豈堪時用字深切䘖之乃見上具言尹焞劄子有所議不可不為施行乞將尹焞所上文字盡付中書當為詳酌行之上遂以先生所上奏上劄盡付中書而秦檜遂切齒於先生矣涪州被召辭免狀和靖處士尹焞今月准宣撫使司發到尚書劄子一道據朝奉大夫充徽猷閣待制提舉建隆觀兼史館修撰資善堂翊善臣范冲奏舉自代六月十五日三省同奉聖㫖尹焞召赴行在仍令川陜宣撫司以禮津遣前來者右焞伏念昨於靖康中纍被召㫖以疾力辭誤䝉告命賜之美名聽其退處方安田里尋被金人侵犯河洛全家遇害僅存一身脫命賊境奔竄三蜀流離纍年疾病憑陵志意衰耗有加前日兼以所習迂濶之學施之事功一無可者不待人諭自知甚明謹具狀申宣撫使司伏乞鈞慈採録焞狀申尚書省所有前降聖㫖指揮施行寢罷以安愚分伏候鈞㫖紹興五年十月日具位狀初二中發第二狀右焞近准宣撫使司遞到尚書省劄子一道坐徽猷閣待制范冲奏舉自代奉聖㫖召赴行在已具狀申使司乞賜備申朝廷伏望寢罷前降聖㫖指揮去訖今月二十八日再准宣撫使司降下御寶封發到尚書省劄子坐范冲奏乞委所在州郡備禮敦遣及沿路津送疾速前來奉聖㫖令川陜宣撫司差撥人船優給路費以禮敦遣前來者伏念焞賦才至陋禀性甚迂蚤以受學程頥之門大觀中嘗致人言重惟布衣之賤名玷臺章杜門絶交於人者埀二十年由兹世事懵不通曉昨緣靖康當路之士誤採虛名交薦於朝屢被詔㫖以疾力辭䝉恩授以處士實遂田野之性尋遭鄊關陷沒妻孥屠害傷殘一身逃竄萬里今則憂患薰心驚惶失志耳聵足弱聽履不任形神俱瘁又非往昔之比豈足上副延求逺膺號召加之軍國多事財用匱乏之際有司津遣之費莫非民力其於愚分尤所未安兹者不避罄瀝肝膽具陳忱懇庶幾感動朝廷追回召命謹具申宣撫使司伏望鈞慈特賜敷奏所有前降聖㫖指揮乞賜寢罷施行伏候鈞㫖紹興五年十月日具位尹焞狀二十九日發第三狀右焞先於去年十月內兩狀申宣撫使司乞備録申奏朝廷辭免召命未奉指揮間又於今月十二日䝉宣撫使司差官齎到御前金字牌遞角一道准去年十一月八日尚書省劄子三省同奉聖㫖尹焞特受左宣教郎除崇政殿說書仍令川陜宣撫司依纍降指揮加禮敦遣赴行在所者切惟國家極治之時西閣講臣實儒者之遴選元祐之初焞師程頥首自布衣召居此職載之簡冊永為令典而焞人微材下質薄器陋徒以蚤承家訓粗守師說獲玷美名已懷忝冒豈為朝廷過聽屢頒召㫖繼下除書改授京秩俾參經幄聞命震驚罔知所措伏念焞衰病流離傷殘窮獨之狀如前所陳加之晚塗多難素業總廢何以贊天子五學之成當儒者千載之遇矧惟中興圖治兼收羣䇿之日其講讀之臣或備顧問豈若平時尋章摘句専於論說而已宜得俊傑之士博通古訓深識時務者來膺斯選殆非疲老踈愚之人可以冒處伏望朝廷察其誠懇檢會所陳事理特行寢罷近降除命謹具申宣撫使司乞賜備録敷奏施行伏候鈞㫖六年正月十二第四狀右焞今月十三日准宣撫使司牒差使臣史誡齎擎到行在入內內侍省御前金字牌遞送到告一軸特授左宣教郎充崇政殿說書契勘先於正月十二日准尚書省劄子照㑹已除上件恩命尋具狀申使司伏乞備録敷奏朝廷辭免去訖見在涪州聽候指揮所有今來齎到告命不敢祗受除已繳申涪州寄納軍資庫謹具狀申宣撫使司伏乞照㑹謹狀六年二月十四日第五狀右焞先䝉聖恩召赴行在所及准告特授宣教郎崇政殿說書纍具辭免奉聖㫖不允不得再有陳請焞恭禀聖訓不敢固違詔㫖除已力疾就道起發前去及候腰膝稍安日謝恩授告申陳去訖伏念焞自夏涉秋傷暑飲冷臟腑不寧腰膝至今未安拜跪尚自艱難有所告命未敢祗受兼以暑月江水泛漲未平難以舟行起發未得恭承嚴召又以數月夙夜憂懼不惶啓處今於九月十七日安舟起發前去重念焞山野空踈自度不足以副朝廷招延之禮加之流離以來多病少安齒髮既衰精神凋耗兹緣病故起發稽遲雖已就道亦恐觸冒風霜不任寒暑疾疹有加筋力寖弱既不堪朝廷職任又不能入奉朝請虛負聖恩隕越無所謹瀝誠懇别具披陳欲望朝廷察焞情實非敢矯飾乞將前降焞告命寢罷施行庶俾衰老餘生安分遂性免迤邐於前路聽候指揮謹具申宣撫使司乞賜備録申奏施行右劄下在十二月二十六日右五狀並在涪州具申四川宣撫司乞備申朝廷時朝命敦遣甚急川陜官屬日夜敦禮候門不容停止遂不得已辭官黽勉應詔起離第六狀見紹興七年正月十三日省劄第七狀見正月二十三日省劄第八狀右云云去歲以來纍䝉趣召恩禮優渥非所敢當懇辭六七未賜允俞除不敢祗受告命外扶疾逺來既至江州所苦增甚不能前進今奉聖㫖令所至州軍以禮敦遣在於愚分尤不遑安伏念焞一芥草茅初無寸長舊學迂闊忘廢殆盡行年七十疾病交攻一日之間半在枕席耳目聾暗步履艱難衆所共知非出矯僞若使稍能支持亦不敢以固陋為辭義當奔走闕下少思補報以稱聖朝招延之意以合古人進退之道豈當固違嚴召自速罪愆力求罷免誠非得已伏望朝廷特賜敷奏收還成命俾得自便訪求醫藥免致重纍流離道路實荷國家全活之賜伏候指揮第九狀和靖處士尹焞右焞今月十九日巳時准尚書省紹興六年十二月二十六日并七年正月十三日兩次降到劄子指揮催促兼程前來赴行在所契勘自涪州起發日具狀申四川制置大使司乞備申辭免恩命沿路聽候指揮正月二十一日至鄂州緣疾病有加具狀申尚書省二月十九日至江州再具狀申尚書省乞賜敷奏寢罷前降恩命未奉指揮間於今年四月十七日准二月二十五日御前金字牌御封尚書省劄子續准都進奏院遞到四月初四日尚書省劄子催促疾速起發於十八日辰時兩具狀自江州繳申尚書省再乞敷奏今更不敢重疊冒瀆伏望憐察愚誠非敢飾詞上欺朝廷乞檢會前狀早賜指揮施行第十狀並見所下省劄第十一狀第十二狀第十三狀第十四狀並略同右焞今月二十五日戌時准御前金字牌降到御封尚書省劄子一道奉聖㫖不許辭免催促疾速赴行在所供職者重念焞鄊關陷沒全家遇禍失身盜賊之區積憂懷忿潜伏山谷者纍年既而間關入蜀萬里一身年埀七十白首無歸人生窮獨何以加此方兹栖栖之餘仰䝉聖君誤採虛名濫膺召命自紹興五年十月內至今年四月凡五被御前金字牌再被尚書省劄子纍䝉朝廷指揮令所在州軍以禮敦遣以焞艱虞羈旅之迹分甘委棄於聖時以焞一芥草茅之賤豈當俟駕而後行况今國步尚艱乃臣子效忠之日即兹數事在於分義無一可辭實以既老且病學問無取耳聵足弱聽履艱辛疾病有加日虞委頓决不能支持前者纍狀陳懇實出愚誠非敢稍有毫髮懷私擇利故為矯激妄欺朝廷以速罪戾兼焞已於今月十八日兩具狀申江州繳申尚書省乞特賜敷奏許令自便訪求醫藥免致道路委填溝壑佇瞻闕庭日覬俞允伏望早賜施行第十五狀右焞今月初四日午時准五月二十九日巳時御前金字牌降到御封尚書省劄子奉聖㫖依尚書左僕射奏以焞辭免新命未聞就道令江州守臣疾速以禮津遣者伏念焞自父祖而上仕於夲朝食祿者八世如焞愚蠢自知不堪世用分甘老死明時亦常濫竊高世之美名略無片善之稱在國家何負於焞顧焞何補於國家自薦膺召㫖以來實以疾病侵凌乞追回成命已十四狀賦性山野言多拙直不識時宜冒犯朝廷日覬罪戾之獲豈謂猶加寬貸尚欲招徠禮益隆厚仰見聖朝求賢待士之至搜揚微陋之誠聞命震驚感恩流涕若尚敢高卧養痾夷倨抗請在朝廷即行誅戮固已晚矣言君臣之分義者固已切齒於焞矣朝廷尚或憐而貸之亦天地之所不容鬼神之所不赦也焞切見方今國步尚艱中原未復進退人才當明緩急今日之務無非繁劇宜先俊傑以濟艱難白首書生動輒迂闊用於平時徒美聽觀施於今日何益事功縱俾犬馬之齒未衰負薪之疾可力其於時事素不通曉况使獨持老病之餘接武英豪之後見聞僻陋冒列經筵又何足以發明㫖義啓沃聖聰考古驗今禆贊元化之萬一哉僥幸以進必致人言負罪而去在焞何惜豈不念貽纍朝廷取笑四方上辱君相下負師友焞今年埀七十惟事安死於時無補於身何有反求諸已自知甚明詢之於人孰不指目重念焞今疾病憂懼全在牀枕俟罪之餘惴惴待盡前後所陳實出迫切雖在草野敢忘愛君若謂矯飾非焞所學伏望朝廷早回天地之大造曲貸螻蟻之微生許令自便訪求醫藥使終殘喘實荷國恩伏乞特賜敷奏施行伏候指揮第十六狀右焞五月二十九日准尚書省劄子檢會四月二十一日三省同奉聖㫖依已降指揮催促疾速赴行在所供職者契看四月十八日及四月二十七日三具狀申尚書省以焞疾病浸加提携重纍乞賜俞允訪求醫藥得以自便至今四十餘日並未䝉朝廷施行切念焞流離道路今已十月自至江州又已三月有餘正此極暑非惟焞一身見在枕席全家老幼盡皆疾病已見失所不免仰於朝廷乞賜憐恤檢會四月十八日及二十七日三狀早賜敷奏放令自便免致道路委填溝壑伏候指揮第十七狀右焞自紹興五年十月初二日被召命紹興六年二月十三日准川陜宣撫司差官齎降到左宣教郎充崇政殿說書告命一軸及袍履等焞以疾病拜跪艱難有妨拜受即時具狀申繳在涪州軍資庫至今前後十七次具狀申朝廷辭免上件恩命乞歸田里訪醫自便纍准朝㫖未賜俞允焞以沿路州軍不敢敦迫雖强扶持已至國門緣在路衝冒所患轉加見招醫調治未獲痊愈所有准今月十一日尚書省劄子再降到元給告命委是祗受未得除見别具狀申辭免乞特賜指揮依舊將上件告命等付元寄官司收管仍乞檢會纍狀早賜敷奏施行伏候指揮第十八狀右焞昨者誤䝉召命敦遣出蜀扶病登舟日增惴懼近者入建康府界已及國門竊念焞近日又苦痢疾一夕之間輒十數起見用建康府醫人王琦調治略未痊安癃老廢疾情實可憐伏望特賜敷奏許之自便以畢餘生伏候指揮第十九狀右焞昨者誤䝉召命敦遣出蜀蓋已歷陳愚陋無補事功加之兩歲之間經涉萬里疾病侵尋屢困道路比復卧病國門至於委頓仰荷聖主親遣中使就加撫勞宣醫診視賜豫過儀且令調治殘骸入覲宸扆而焞尫羸之質倍費調攝雖疾病向安而筋骸尚劣大懼久稽君命罪不容誅早夜以思罔知攸措伏念焞前後懇辭及今凡二十狀情實切至不敢誕誣雖聖㫖寬假又許入城調治以俟痊安而焞偃仰稽留豈遑安處日月漸久人將謂何又慮踈賤之言未必皆能上徹天聽謹將前後二十狀録連在前伏望朝廷特賜敷奏收還恩命以協師言伏候指揮右通涪州員司申狀共訃二十狀係到闕日繳連具申辭免者至閏十月初八日又被㫖除祕書省校書郎兼崇政殿說書所有辭免劄子録於後除祕書郎恩命亦係三次辭免辭免除祕書郎劄子左宣教郎充崇政殿說書尹焞劄子准尚書省劄子奉聖㫖除祕書郎兼崇政殿說書聞命震驚罔知所措伏念焞逺自草萊誤䝉收召經帷之命已非所宜方欲陛對之間力陳固陋今復躐處祕書尤為美職恩榮重復實不自安伏望朝廷特賜敷奏收還成命伏候指揮閏月十一日有㫖不允令閣門先次朝見供職第二劄新授左宣教郎充崇政殿說書尹焞劄子奏臣猥以非才䝉陛下萬里招聘道路連年疾病屢作懇辭數十天眷日加顧臣何人得此異數今者負薪之疾偶獲少瘳既已入拜冕旒於軒陛之下登對清光於咫尺之間疏逺之臣榮幸極矣伏念焞材質凡陋學問迂踈已及衰殘濟之疾病自度無以開發聖明裨補政治伏乞依臣前件辭免特賜收還崇政殿說書恩命許臣在外自便取進止十月十四日三省同奉聖㫖不允第三劄近准尚書省劄子奉聖㫖除焞祕書郎兼崇政殿說書已罄愚衷乞行寢罷奉聖㫖不允先次朝見赴講筵供職伏念焞猥以庸虛備數勸講辭不獲命愧懼已深方念誠懇未伸恩寵過厚至於祕省美職尤出非宜兼焞被命以來未有一字之稱旬月之勞僥幸如斯敢復叨冒伏望朝廷特賜敷奏收還新除祕書省祕書郎恩命庶使稍獲自安勉於經筵粗圖報效伏候指揮辭免除祕書少監准尚書省劄子奉聖㫖除祕書少監依前兼崇政殿說書聞命震驚罔知所措伏念焞本草萊之人誤䝉聘召擢受臺郎俾侍經帷眷遇優異不許固辭叨冒纍月衰病日甚絲毫無補坐縻廪食焞雖至愚寧不知愧徒以被㫖解釋論語未就未敢干告朝廷乞歸田里豈可更貪寵榮躐進美職聖恩雖厚實出無名况東觀令承以待英進豈焞病廢得以冒居伏乞特賜敷奏追回成命以安愚分伏候指揮紹興八年二月二十九日左宣教郎祕書省祕書郎兼崇政殿說書尹焞狀第二狀今月初二日准尚書省劄子勘會已降指揮除祕書少監奉聖㫖不候受告日下先次供職契勘先准尚書省劄子奉聖㫖除前件差遣已具狀申尚書省以焞衰病辭免乞賜追寢恩命未䝉指揮伏念焞見以病瘡在假不任步履欲乞檢會前狀事理敷奏乞行寢罷施行伏候指揮第三狀伏以圖書之府朝廷待天下英才以備任使昨䝉聖恩除祕書郎自以衰老迂愚名實不稱顧視同僚已極慚􅌤今復躐處上列非據益深未被俞允不知攸措重念焞草萊寒士本無見聞昨䝉招延俾待勸講既已辭不獲命止欲扶病造朝一見聖主即求退居田里會有㫖講解論語又值車駕時巡百司進發所以未敢干瀆朝聽豈謂誤恩復加進擢揣分量才無一可者伏望特賜敷奏收還成命伏候指揮第四狀近三具狀申瀆朝廷乞寢罷新除祕書少監恩命未䝉矜允切念焞草萊寒士本無所長誤䝉聖主招延置之講席非不知幸加之一生迍邅白首流落初無姓名在人齒牙日者起自布衣得侍聖主清閒之燕豈不知榮幸至此實為過分豈不欲勉勵愚鈍少酬眷禮但焞以才術淺拙學問迂踈疾病侵凌志慮衰耗技止於此無補今時惟有知足安分戒之在得或可以不纍師友不辱聖朝少助廉恥之風使天下謂朝廷聘召之人粗知分守亦足以為朝廷美事情實誠慤非敢誕謾拙於言辭未能取信伏望檢會纍狀曲賜敷奏追寢新除祕書少監恩命伏候指揮右劄三月十六日三省同奉聖㫖不允不許再有陳請可速就職以副崇重儒學之意第五狀近四具狀乞寢罷新除祕書少監恩命者伏念焞雖庸愚粗知忠信處身甚約不敢過求平生里社之間去就取舍未嘗以一語欺人人頗以是信之今年埀七十濫稱儒士豈敢矯情作僞以不忠不信之言欺於君父之前哉實以學問荒唐加之老病昨䝉聘召固已力陳其不堪聖上過聽必欲見其靣目促召再三恩禮隆厚臣子之分懼獲譴誅止欲扶病造朝旬日之間即求閒退不謂洊䝉超擢驟冠同列使焞筋骸年齒稍可支持其在素志猶不敢當况是尫羸昏忘舉動艱難少壯之榮反成苦楚唯有退間自適是為重恩方欲乞身敢復叨據區區之懇始末不渝皆出忱誠了無矯僞伏望朝廷更賜敷奏收還前件祕書少監恩命伏候指揮辭免兼史館日歷狀左宣教郎試祕書少監兼崇政殿說書尹焞狀契勘本省長二依條不與修纂至紹興元年七月內因祕書少監程俱申請特令修纂日歷後來緣重修實録因而又兼史館職事切緣焞見係崇政殿說書不惟拙於文筆不通史學兼間日赴經筵進講文字又有専得指揮解說論語未了委是精力有限難以兼營修纂欲望許依舊來條例特免史館日歷職事伏候指揮四月九日三省同奉聖㫖特依和靖集卷一
