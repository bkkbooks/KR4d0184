  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0184_WYG_004-1a, image: WYG1136/WYG1136-0027c.png}
body:
  text: 和靖集巻四宋尹焞撰壁帖聖學聖可學乎曰可曰有要乎曰有請問焉曰一為要一者無欲也無欲則静虚動直静虛則明明則通動直則公公則溥明通公溥庶矣乎焞謹書曽子曰以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友甞從事於斯矣子曰君子成人之美不成人之惡小人反是公都子問曰鈞是人也或為大人或為小人何也孟子曰從其大體為大人從其小體為小人曰鈞是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所與我者先立乎其大者則其小者弗能奪也此為大人而已矣孟子曰居下位而不獲於上民不可得而治也獲於上有道不信於友弗獲於上矣信於友有道事親弗悅弗信於友矣悅親有道反身不誠不悅於親矣誠身有道不明乎善不誠其身矣是故誠者天之道也思誠者人之道也至誠而不動者未之有也不誠未有能動者也學者捨禮義則飽食終日無所猷為與下民一致所事不踰衣食之間燕逰之樂耳君子之道成身成性以為功者也未至於聖皆行而未成之地爾益物必誠如天之生物日進日息自益必誠如川之方至日増日得施之妄學之不勤欲自益且益人難矣哉易曰益長裕而不設設謂虛設信夫銘諸牖以自訟紹興八年正月二十二日焞謹書子貢問曰有一言而可以終身行之者乎子曰其恕乎已所不欲勿施於人可願可欲雖聖人之知不越盡其才以勉焉而已故君子之道四雖孔子自謂未能博施濟衆修已安百姓堯舜病諸是知人有願有欲不能窮其願欲子貢曰君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者曰賜也亦有惡乎惡徼以為知者惡不孫以為勇者惡訐以為直者孔子曰君子有三畏畏天命順吉逆凶天之命也畏大人與天地合其德畏聖人之言小人不知天命而不畏也狎大人侮聖人之言子曰可與言而不與言失人不可與言而與之言失言知者不失人亦不失言子曰其言之不怍則為之也難内有其實則言之不慚樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也子貢問友子曰忠告而善道之不可則止毋自辱焉耳目口鼻四肢之欲性也然有分焉不可謂我須要得是命也仁義禮智天道在人賦分有厚薄是命也然有性焉可以學故不謂性君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉在上位不陵下在下位不援上正已而不求於人則無怨上不怨天下不尤人故君子居易以俟命小人行險以徼幸子曰射有似乎君子失諸正鵠反求諸其身君子之遇事無巨細一於敬而已簡細故以自崇非敬也飾私智以為意非敬也要之無敢慢而已樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也然則執事敬固為仁之端推是心而成之則篤恭而天下平矣寥寥天氣已高秋更倚凌虛百尺樓世上利名羣蠛蠓古来興廢㡬浮漚退安陋巷顔淵樂不見長安李白愁兩事到頭湏有得我心處處自優逰閑来無事不從容睡覺東牕日已紅萬物静觀皆自得四時佳興與人同道通天地有形外思入風雲變態中富貴不滛貧賤樂男兒到此是豪雄右秋日偶成紹興十年十月初七日天氣清明因筆書此時居桐廬縣廨西西齋能言未是難行得始為難湏是真男子方能無厚顔曉日都門䬃斾旌晚風鐃吹入三城知公再為蒼生起不是尋常刺史行春秋正王道明大法也孔子為後世王者而修也亂臣賊子誅死者於前所以懼生者於後也宜乎萬世無窮王祀孔子報徳報功之無盡焉道徳高厚教化無窮實與天地参而四時同者其惟孔子乎顔子一簞食一瓢飲居陋巷人不堪其憂而不改其樂夫富貴人之所愛者也顔子不愛不求而樂乎貧者獨何心哉天地間有至貴至愛可求而異乎彼者見其大而忘小焉耳得其大則心泰心㤗則無不足則貴富賤貧處之一也處之一則能化而齊故顔子亞聖畏天命則可以不失付畀畏大人如此尊嚴而亦自可畏畏聖人之言則可以進徳三者學者之宜慎予其思之窮不能巻達不能舒謂之知道不亦難乎右窮達吟中庸曰大哉聖人之道洋洋乎發育萬物峻極于天優優大哉禮儀三百威儀三千待其人而後行故曰茍不至德至道不凝焉皆是一貫萬物之生意最可觀此元者善之長也茂叔牕前草不鋤去云與自家意思一般觀天地生物氣象静坐獨處不難居廣居應天下為難民之秉彛也故好是懿徳萬物皆有理順之則易逆之則難各循其理何勞於已哉人心莫不有知惟蔽於人欲則亡也天理皆實理也人而信者為難子曰治亂運也有乗之者有革之者窮達時也有行之者有遇之者吉㓙命也有作之者有偶之者一徃一来各以數至豈徒云哉意未萌于心言未出諸口神莫得而窺人莫得而咎君子貴慎獨上不愧屋漏人神亦吾心口自處其後天命之謂性率性之謂道脩道之謂教道也者不可湏臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隠莫顯乎微故君子慎其獨也喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉身生天地後心在天地前天地自我出自餘何足言右自餘吟家請官供不報答無異雀䑕偷太倉子言讀書者當觀聖人所以作經之意與聖人所以用心與聖人所以至聖人而吾之所以未至者所以未得者句句而求之晝誦而味之中夜而思之平其心易其氣闕其疑則聖人之意見矣困辱非憂取困辱惟憂榮利非樂忘榮利惟樂子張問行子曰言忠信行篤敬雖蠻陌之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其参於前也在輿則見其倚於衡也夫然後行子張書諸紳吾不仕故成業不動故無悔不廣求故得不雜學故明論性不論氣不備論氣不論性不明二之則不是薛收問易子曰天地之中非他也人也收退而歎曰乃今知人事修天地之理得矣周之人以石之韞玉者為朴鄭人之言以䑕之腊者為朴鄭謂周曰欲朴乎周人大悅願屬目出而視之死䑕也唾之而去視聽言動行住坐卧謹之慎之日求寡過君子行禮不求變俗踐形有說常希孟樂内無功可比回子曰語之而不惰者其回也與其言之不怍則為之也難言輕則招憂行輕則招辜貌輕則招辱好輕則招滛視聽思慮動作皆天也但人於其中要識得真與妄耳不能動人只是誠不至於事厭倦皆是無誠處由孟子則可以觀易言有教動有法晝有為宵有得息有養瞬有存二月二日至此閑過時日甚多處此室不勤于學誠吾師之罪人也三月十五日書九月十九日已後人有長短是非不須論說人各是其所是而非其所非似非已事安知人不以已是為非乎戒之慎之無蹈前過也置之目前日當三省治心以正保躬以静進退有義得失有命守道在已成功則天為者敗之不如自然温公無為賛多聞前古聖賢之言與行考跡以觀其用察言以求其心識而得之以畜成其徳子居家雖孩孺不狎其使人也雖童僕必斂容罪莫大於好進禍莫大於多言病莫大於不聞過辱莫大於不知恥或問一日静坐見萬事平等無礙皆在我和氣中此是仁否曰是静中之功盖心虚氣平而然須於應事時常有此氣象方好子曰鬼神之為徳其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可揜如此夫君子寧言之不顧不規規於非義之信寧身被困辱不徇人以失禮之恭寧孤立無助不失親於可賤之人三者知和而能以禮節之也誠哉斯言守而勿失好仁如好色好仁為甚矣見過而内自訟惡不仁而不使加乎其身惡不仁為甚矣學者不如是不足以誠其身故孔子未見其人必歎曰已矣夫思之甚也子曰素隠行怪後世有述焉吾弗為之矣君子遵道而行半途而廢吾弗能已矣君子依乎中庸遯世不見知而不悔唯聖者能之古人避地隠居須慎其所處不為人知姓名乃善處者也余尚未能絶交息㳺是為深病年將七十學不日進道不加修碌碌隨衆實為人世間一蠧物耳書此以自訟九月初七日謹書可勉者行可信者言可委者命可託者天四可吟言不可妄行不可隳命不可忽天不可違四不可吟耳不妄聽目無妄顧口無妄言心無妄慮四者不妄聖賢之具余何人哉敢不希慕季春初九日焞謹書寸心明徹物難方質直從來氣焰長何事陋居藏不得畵堂金殿借餘光百年光景擲梭如無事休將世網拘天盖地承今昔在争名懐利一歸虚紹興十年三月中澣日虎邱西菴三畏齋書和靖尹公先生遺墨一巻皆先生晚歳片紙手書聖賢所示治氣養心之要粘之屋壁以自警戒者其家緝而藏之今陽夏趙侯刻置臨川郡齋摹本見寄熹竊惟念前賢進脩不倦死而後已其心烱烱猶若可識而趙侯所以摹刻之意又非取其字畫之工以供好事者之傳玩而已捧讀終篇恍然自失因敬識其後以自詔云淳熈丙申三月丁巳新安朱熹敬書和靖先生所居之齋多以片紙書格言至論置於牕壁間今徃徃藏於其家如此所刻是也反復玩繹遐想其感發之趣深存體之功至而浹洽之味為無窮也嗟乎學者於此亦可以得師矣淳熈丙申三月壬戌廣漢張栻謹書和靖集巻四
