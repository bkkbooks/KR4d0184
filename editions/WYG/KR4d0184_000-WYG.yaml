body:
  text: 和靖集目錄别集類三宋巻一奏劄上巻二奏劄下巻三詩雜文書巻四壁帖巻五師說上巻六師說中巻七師說下巻八年譜臣等謹案和靖集八巻宋徽猷閣待制河南尹焞撰焞字彦明年十二應進士舉䇿問議誅元祐黨籍不對而出靖康初賜號和靖處士後以范冲張浚薦入經筵列侍從旋乞致仕集凡八巻首列奏劄二巻次詩文一巻次壁帖一巻是其手書聖賢治氣飬心之要帖之屋壁以自警惕又次師說三巻則其門人王時敏編輯末附年譜為第八巻朱子語錄謂焞文字其有闗朝廷者多門人代作今亦不可復考然指授㸃定亦必焞所自為亦猶㑹昌一品集序雖李商隠作究以鄭亞改本為勝正不必盡自己出也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e0bfeed049f1c1466e8705e977eb69608b53373861dcf68c6351fbc9a17e6a58
