body:
  text: 和靖集卷二宋尹焞撰奏劄下再乞歸田里劄子伏為年齒衰邁疾病侵尋自昨初赴招延已於奏對之日乞候旬月之間即歸田畝近者又常靣乞骸骨不蒙允從切緣焞日來疾病益多加之嘔血欲乞特賜敷奏許歸田里伏候指揮辭免除職宫觀二狀見四月二十一日及二十七日二劄內辭免直徽猷閣職名狀右焞云云伏念焞雖甚庸愚豈不知遭遇聖世眷戀君恩但以行年七十疾病百出精神筋力勉強不前所以必求間退保養殘年今不蒙朝廷許致仕而去至於改授職名奉祠闕下使之便間時奉勸講聖恩隆厚不敢固辭然而延閣寓真實為清選請去而得何異要求焞今更不敢力請自便止乞收還貼職少安愚分伏望朝廷特賜敷奏施行辭免賜緋章服狀左宣教郎新除直徽猷閣主管萬夀觀兼崇政殿説書尹焞準敕特賜緋魚袋伏念焞自被召除叨榮有愧比緣卧病方請退間更蒙寵錫身章益隆異數在焞山野之質有所未安伏乞特賜敷奏收還上件恩命伏候指揮辭免太常少卿狀見八年十月二十五日所下第二狀準尚書劄子以焞辭免新除太常少卿奉聖旨不允不得再有陳請者伏念焞行年六十九歲昨蒙朝廷察其衰病罷免祕書少監改授前件差遣自後老病交攻甚於前日念惟坐享祿食専以説書為職方聖上日御經筵未敢求去止欲候秋講罷日乞歸田畝今來復蒙除用豈不知榮但以年老久病筋力衰廢實難勉強伏候敕旨辭免除禮部侍郎劄子臣十一月十九日準尚書省劄子三省同奉聖旨除臣權禮部侍郎張詢除太常少卿並日下供職者臣聞命震驚罔知所措切緣臣近以衝寒冒濕臟腑暴下於十一月十六日在假權將執事交割與以次官主管見今將理未安今來除已遵次指揮日下將太常少卿職事交割與張詢外伏念臣本以庸虛誤膺召用尸素朝列有愧於心嘗以學術迂踈年齒衰邁丐歸田畝未賜允俞豈可更復叨冒寵榮濫厠法從上恩雖厚公議謂何欲望聖慈追還成命以臣見今衰病伏枕乞除一在外宫觀以安愚分伏候敕旨第二劄伏念臣久侍經幄無補聖朝敢謂誤恩復加升用眷惟臣學日迂陋老病侵凌雖欲更冒寵榮力雖勉強云云再奉德音惟深感懼尚餘愚懇必覬矜憐伏念臣召自草萊擢侍帷幄虛辱禮遇何補聖朝屢丐歸田誠非矯飾繼請致仕實坐衰遲遂蒙處之直祠養其老病上體至意莫獲固辭豈期復被簡除大駭聞聽載惟寵異彌切兢惶念一歲四遷顧恩榮之已極而十日九病則衰遲之可知深負素餐難逃清議且人無既老復壯之理而禮有辭尊居卑之謙揣分度宜無名可受况臣近苦暴下尤覺頓衰致精力之昏疲增聽履之蹇聵既難任事豈合貪榮矧惟宗伯名曹詎容妄受講臣清選奚得久居伏望洞鑒丹衷曲全素履亟投間散使畢衰殘貪祿忘歸已厚顔於朝路見得思義敢重辱於師門仰覬天聰俯從人欲所有上件恩命欲乞寢罷伏候敕旨第三劄伏念臣久侍經筵略無報效坐縻廪食分所不安加之見病伏枕日就困殆欲望聖慈矜憫老病特賜收還成命以安愚分伏候敕旨第四劄伏念臣學識迂踈豈堪時用加之老疾精力日衰頃緣誤被招延躐升華要聖恩隆厚不聽固辭然久竊寵榮實增愧懼近拜奉常新命仰體眷意未敢即便求歸田里重念臣未奉上件恩命以前為苦暴下己申臺省在假將理丹藥雜進略未少安復蒙簡除第深感泣惟從班清峻固非鄙陋得以冒居而衰病沉縈實以筋力難於勉強臣今老病已極日就危殆欲望聖慈曲賜矜念特許收還成命俾遂安養伏候敕旨第五劄伏念臣行年六十九歲見因暴下氣喘足弱疾勢日增未有安期雖欲勉強必致顛仆臣久荷聖知粗守忠信不敢矯偽妄稱疾病以欺君父欲望聖慈特賜矜憫收還成命俾遂將理再乞歸田里劄子新除左通直郎權禮部侍郎兼侍講尹焞奏臣伏為任太常卿日以感寒暴下遂申臺省在假將理病中蒙恩命權禮部侍郎兼侍講纍具狀辭免未奉俞允忽蒙陛下哀憐就蒙賜告天地生成之恩何以論報臣豈不願力疾一出上副陛下待遇之意然臣今來所病馴致虛極醫藥不效無有安期况臣大病伏枕已二十餘日衰老至此見苦滑泄氣虛喘促足弱筋攣耳聾目眩心識昏耗百病交攻委難勉強欲望聖慈放歸田里以便安養伏候敕旨第二劄臣伏自十二月十六日第八次具奏辭免前件新除恩命及緣老病乞歸田里至今十日未奉俞旨卧病伏枕展轉呻吟已四十餘日藥石雜進略無少痊數日以來更加心疼胸痞眊眩繼作自知衰羸未易醫治重念臣一生寒賤晚遇聖明期月之間致身侍從豈無眷戀少報生成而自未蒙除授以前得疾在告至於憊甚聞命之日感激聖恩雖欲自勵以趨卒難勉強况臣平生所學粗守忠信行年七十何忍欺君欲望陛下念臣實病保臣殘年特降聖旨放歸田里或除一在外宫觀庶幾安養可就痊平臣病軀苦楚日夜延望必覬允從仰惟天地父母之恩少加矜念臣頻有冒瀆天聽甘俟斧鉞之誅伏候敕旨辭免除徽猷閣待制新除左通直郎尹焞臣比因老病前後十上章乞收還新除禮部侍郎兼侍講恩命放歸田里正月初十日準尚書省劄子奉聖旨除臣徽猷閣待制提舉萬夀觀兼侍講者聞命震驚罔知所措伏念臣本緣衰疾不能拜命故敢屢瀆天威力請間退今復進職西清奉祠行闕尚使荒陋綴直講筵天眷加隆感深涕霣而臣懇誠殫盡辭説已窮未能感動淵衷曲賜孚允豈得辭勞就逸求去復遷上欺朝廷以要榮寵其於義分益所未安况臣衰病日加略無痊愈欲求追罷成命檢會纍奏放歸田畝伏候敕旨第二劄伏念臣年老卧病非敢詐罔前後所陳辭窮理盡忱誠雖竭天意未孚且臣起自草莽驟躐禁塗得君遇時千古罕見豈不知君命之嚴事上之義在於臣子只合遵承安敢抗拒恩命辭避榮寵實緣疾病沉痼決難勉強凡在朝列皆所見聞欲望云云第三劄臣聞君使臣以禮臣事君以義乃君臣之大倫報施之道也臣獲侍燕間一歲之久五遷名秩率皆清華則陛下所以使臣可謂盡禮矣臣敢不盡事君之義圖報陛下乎臣自辭免禮部侍郎恩命章疏十上條例懇請悃愊殫盡未奉俞允臣草芥微賤固無足道而朝廷名器之重豈宜輕以假人深慮辭之不至誠之未格不避再三之瀆重陳當去之義仰干天聽惟陛下赦其愚使畢其説以全事君之義不勝幸甚臣自造闕廷職在勸講而夲無學術蔑有發明期月之間病告相繼坐叨厚禮無補聖聰先聖有言陳力就列不能者止此臣義當去者一也臣起自草萊誤應召用守道之語形於訓詞而臣貪戀寵榮遂係素守使朝廷非常不次之舉獲懷利茍得之人非特上纍聖知將復貽辱師友此臣義當去者二也臣每念誤受寵知蔑聞補報比嘗不量分守輒及國事識見迂愚已驗於今迹其庸愚豈堪時用此臣義當去者三也臣昨拜命奉常曽未踰月方移病告遽擢春官卧病至今未嘗供職以病丐去更獲超遷有何功實得以祗受此臣義當去者四也臣聞國朝典故揆之禮經年七十皆當致仕今臣年齒已及加之衰病伏枕纍月實難支持血氣既衰所戒在得先聖遺訓其理甚微此臣義當去者五也臣聞聖君有從欲之仁匹夫有莫奪之志今臣有五可去之義無一可留之理仰惟陛下眷知之深洞照情實曲推上聖之仁俯成匹夫之志特賜檢會纍奏放歸田畝伏候敕旨授內宫觀再乞歸劄子臣近緣第三次辭免新除左通直郎充徽猷閣待制提舉萬夀觀兼侍講恩命云云伏念臣前所陳述乃事君之大義人臣之常分盡出誠實非事矯偽欲望聖慈檢會臣纍奏特許臣退歸田里俾養衰病以盡殘年伏候敕旨二月八日奉聖旨依舊徽猷閣待制差提舉江州太平觀任便居止乞辭免謝劄子左通直郎充徽猷閣待制提舉太平觀尹焞奏臣近緣疾病羸困乞歸田里聖恩寬大許令自便準勑提舉江州太平觀一介書生何以仰朝廷成就憐憫之意切念卧病之久筋力疲乏步履拜跪不能勉強無緣出赴謝辭欲望特賜敷奏放免辭謝庶使羸軀不至殞越取進止辭免除次對職名劄子臣已於今月十五日扶病出門前去平江府以來就醫居住伏念臣昨蒙陛下召從田野置在經筵雖曽蒙除禮部侍郎緣為卧病在告元不曽供職今來仰荷聖恩許從自便但以次對之職難以冒受欲望云云乞致仕劄子伏念臣本以庸愚老於田野頃值聖明逺加聘召牢辭弗獲誤被寵光起侍經帷遂躋禁從略無微效之可録實以多病而得休今者犬馬之年已登七十形神衰瘁疾病侵凌報國無時拊躬知愧安可尚叨廪稍坐食祠庭揣分據經亟當請老欲望聖旨許臣依條致仕伏候敕旨遺表上表為永辭軒陛事臣焞言焞聞有生必死乃事理之固然原始要終亦臣心所深諭獨有終身之恨曽微報國一作主之功將死有陳其言或善臣焞中謝伏念臣幼則孤蹇長而賤貧道不合時志惟師古幸有淵源之自竊窺聖哲之心顧得志之莫期則終身而獨善絶清時結綬之志有後進舞雩之逰不意埀老之年乃遇中興之主伸靖康招聘之意易和靖安退之名起從遐徼羈旅之中置之勸講侍從之列來﨑嶇者萬里奉清燕者踰年感得時之若斯實有幡然之志悵事君之已晚莫勝薾爾之軀終卧病而乞歸尋引年而告老始終被遇自謂莫倫死生之間夫復何憾伏望皇帝陛下益隆聖學廣被名賢惟祖宗為陛下之規惟方䇿為陛下之鑑洪惟我宋度越前朝惟子惟孫有典有則而况天方悔禍民獲小康益勤宵旰之憂必復國家之始永辭聖世莫罄愚衷臣無任瞻天仰聖結戀於悒之至謹奉遺表以聞臣誠惶誠懼頓首頓首謹言紹興十二年十一月日奉議郎充徽猷閣待制致仕臣尹焞和靖集卷二
