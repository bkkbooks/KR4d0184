body:
  text: 和靖集巻八年譜神宗皇帝熈寧四年辛亥是歳七月辛未日戊戌時先生生于河南府河南縣嘉善坊之第祖河内先生諱源字子漸叔祖河南先生諱洙字師魯皆有文集行于世考虞部員外郎諱林妣陳氏澗上陳公廙字叔易之女五年壬子六年癸丑七年甲寅八年乙卯九年丙辰十年丁巳元豐元年戊午先生年八歳丁虞部憂二年己未三年庚申四年辛酉五年壬戌六年癸亥七年甲子八年乙丑哲宗皇帝元祐元年丙寅先生年十六二年丁卯先生年十七為舉子時教授蘇昞季明一見大竒之謂先生曰子以狀元及第即學乎唯復科舉之外更有所謂學乎先生疑一日蘇因會茶舉盞以示曰此豈不是學先生遂徃見伊川先生三年戊辰伊川先生授先生以大學西銘又令㸔敬字四年己巳五年庚午先生年十九應進士舉䇿問誅元祐黨籍先生歎曰以此䇿士吾尚可以干禄乎不對而出告於伊川曰吾不復應進士舉矣伊川曰汝有母何以為養先生歸白陳夫人曰焞昨應舉䇿問如此焞不忍答而出焞將不復應舉矣恐無以為養夫人曰汝以仕可為善耶汝以學可為善耶先生曰皆為善爾夫人曰吾但知汝以善養不知以禄養先生喜出告伊川伊川曰賢哉母也六年辛未先生學易於伊川七年壬申先生年二十二娶張氏八年癸酉紹聖元年甲戌四月十二日改元二年乙亥三年丙子四年丁丑伊川先生謫涪州元符元年戊寅六月一日改元二年己邜三年庚辰徽宗皇帝建中靖國元年辛巳先生年三十一崇寧元年壬午二年癸未三年甲申四年乙酉五年丙戌伊川先生以易傳授先生大觀元年丁亥先生年三十七新學日興諫官范致虚上言曰程頥倡為異端尹焞張繹為之羽翼二年戊子三年己丑四年庚寅致和元年辛邜二年壬辰三年癸巳四年甲午五年乙未六年丙申七年丁酉八年戊戌重和元年二年己亥宣和元年三月一日改元二年庚子三年辛丑四年壬寅五年癸卯六年甲辰七年乙巳欽宗皇帝靖康元年是歳九月鎮洮軍節度使同知樞宻院事京畿河北東路宣撫使种師道上表薦先生乞召置經筵劄子云臣竊惟陛下自臨御以來德政更新中外人才凡為公論所與者無不收用况於尚德之選茍有其人理不可遺伏見河南府布衣尹焞故尹源之孫尹洙之姪孫學専師古行足勵俗潜心允蹈踰三十年西都學者皆稱仰之未甞應書不求仕進若䝉召致俾預講說必有補益臣非職事素所深知冐昩薦聞不勝惶懼之至取進止有㫖召赴闕令河南府以禮津遣先生辭曰欲寡過而未能安足以上副此遣河南府守臣王襄引孔子不俟駕之語促行先生曰焞草萊之臣不敢當君命不俟駕此孔子當位時事若不在其位則不然也王襄曰先生辯矣再有㫖促召先生不得已至闕又謝不敢朝上知不能留也十月詔賜和靖處士放還山告詞云勅西京布衣尹焞慶歴間有賢臣焉朕不見也每覽國史高其節概爾能力學操行以世其家甘貧守約不競榮利是亦可嘉矣用錫美名式勸頹俗爾其以行義教鄉里使有矜式焉則予惟爾嘉可特賜和靖處士靖康元年九月日中書舍人劉正行戸部尚書梅公執禮兵部尚書孫公傳御史中丞吕公好問戸部侍郎邵公溥中書舍人胡公安國諫議大夫徐公秉哲又同奏乞特加職擢奏曰臣等伏見河南布衣尹焞徳備中和學窮根本言動惟時皆可師法器識宏逺可以任大臣等淺陋不足以盡知然近來招延之士無出其右者昨䝉朝廷特召河南府津遣赴闕伏聞命之處士以歸使焞韜藏國器不為時用未副朝廷仄席求賢之意伏望聖慈特加職擢以慰天下士大夫之望謹録奏聞伏候勅㫖二年丙午金人陷洛陽先生闔門遇害張夫人與子鈞俱死于賊先生死而復甦門人潜載以逃尋訪尹氏遺族遇先生之弟武功府君燭及武功夫人全氏携姪墺逃匿民舍時亂兵間尹氏僅存者先生與燭墺三人耳墺時甫八歳後以先生郊恩補將仕郎終於通判金州先生傷重不能行家人輿舁匿山谷間高宗皇帝建炎元年丁未先生年五十七在長水山中二年戊申先生在長水山中長安陷劉豫僣號使其偽師趙斌卑詞厚禮儀從甚盛以兵刼先生于山中先生抗罵不屈夜徒歩渡渭携墺及邢氏女潜匿罽水谷中三年己酉先生在罽水四年庚戌先生自秦中至永興軍黄萯谷紹興元年辛亥先生年六十一二年壬子先生隨楊彦中入蜀至閬州時張公浚宣撫川陜門人吕稽中為計議官延請舘先生于閬中遂至遂寧復徃瀘南子婿邢純官所又過戎溆七月二十五日有題伊川易傳後語三年癸丑先生徃來至巴中廣安軍弟燭武功府君卒于廣安四年甲寅七月二十三日邢純監涪陵酒稅復迎侍先生以徃先生寓舘於涪州千福院十二月望日門人馮忠恕來有題馮聖先墓銘䟦語五年乙卯先生寓涪扁一室曰六有齋名所居曰習堂六月十五日左朝奉大夫充徽猷閣待制提舉建隆觀兼史舘修撰兼侍講兼資善堂翊善范冲舉先生自代有㫖尹焞召赴行在仍令川陜宣撫司以禮津遣九月十二日左朝奉大夫充徽猷閣待制提舉建隆觀兼史舘修撰兼侍講兼資善堂翊善臣范冲再奏蜀道雖通然行旅艱難自非州郡委曲津遣無縁起發十三日三省同奉聖㫖令川陜宣撫司差撥人船優給路費以禮敦遣前來赴行在所十月初三日宣司發省劄至涪州時涪守李瞻備禮至千福院津遣先生申宣司辭免二十八日宣司再牒涪州備坐聖㫖指揮差撥人船以禮津遣先生再申宣司乞備録奏免時上謂侍臣曰昔召程頥盖自布衣除崇政殿說書十一月六日遂降㫖尹焞特授左宣教郎除崇政殿說書仍令川陜宣撫司依累降指揮加禮津遣赴行在所十一月二十七日宣司准入内内侍省御前金字牌并御前實封劄子付下左宣教郎說書告并差幹辦官蔣世雄來涪州尋訪先生居處催促起發涪守李瞻申尹處士獨處一室嘉遯養浩志尚高潔邦人莫得而見非有司文移可致六年丙辰正月宣司差官委䕫路運副韓固運判王肇知涪州李瞻詣先生之廬備禮再三勸勉起發十三日先生以告繳納涪州軍資庫再申宣司辭免三月六日又降㫖促召四月六日又准省劄催促五月七日宣司再得㫖催促及又差使臣史誡等解袍笏等來先生不受仍以繳納涪州軍資庫八月十八日有䟦馮聖先墓銘後序自五月以來宣司所差官日夕候門不敢去至九月十七日先生廹不得已登舟啟行又申制司以病不敢受誥乞於前路聽候指揮先是伊川先生有祠在涪之北巖九月二十五日先生以文告於伊川之祠而行其文云有補于世則未也不辱其門則有之云云先生既行蜀人又於北巖立先生之祠焉十月至䕫十二月二十六日朝廷又降劄促令疾速兼程前來仍不許再有辭免七年丁巳正月十三日先生至荆南朝廷再降劄促召二十一日至鄂州二十三日又准尚書省及御前實封劄子促召先生又以疾乞自便將理二月十九日至江州二十五日及三月十七日又連准省劄催促二十一日又申江州乞具奏辭免四月四日至五月五日凡三劄催促五月二十日左僕射同中書門下平章事兼樞宻使都督諸路軍馬張浚又上䟽力薦乞更加禮津遣五月二十日三省同奉聖㫖依奏五月二十九日巳時御前金字牌備張公浚劄子又加促召先生又繳申江州乞自便尋醫六月二十四日又准省劄促召先生又以疾辭八月又得㫖令江州守臣以禮津遣九月先生至建康府界先是左司諫陳公輔上言請禁伊川學至是先生因併引以辭涪州所差隨行軍員何伸以本州所繳崇政殿說書告乞袍笏等繳納行在激賞庫何伸狀云見附集九月十一日朝廷又以官告袍笏等劄下責付先生家屬交領又辭上曰尹焞可謂恬退矣辭免之奏十數上而未止候疾痊安即召對又降㫖遣宰相趙鼎及恭知政事秦檜出國門存問慰勞仍先賜御府金帛藥等先生再力以疾辭官九月十三日又降㫖體劄下事理疾速祗受告命仍具知委文狀申尚書省先生又列前後所上二十狀繳連乞收還恩命十月八日又劄下令候痊安日令閤門引見上殿先生以病未敢受告閏十月一日又劄下訪聞本官今已痊安所有告命即疾速祗受閏月初八日奉聖㫖尹焞除祕書郎兼崇政殿說書先生又辭十一日奉聖㫖不允令先次朝見赴講筵供職十二日先生始入見力辭於上前上曰朕渴卿久矣知卿從程頥學俟卿以講學不敢以有他先生遜謝辭不獲命遂供職講筵承續講衛靈公之末章稱㫖遂給筆札解論語以進時先生又力辭秘書之命十五日奉聖㫖不允先生既再辭不允又乞致仕左僕射趙公鼎奏曰尹焞有山林之志不樂留此願以禮留之上遂再加錫賚八年戊午二月車駕還錢塘先生以病從百司先行二十七日除秘書少監仍兼崇政殿說書先生又凡五辭三月病少愈力疾赴講筵先生每當赴講之日前一夕必沐浴更衣以所講書置案上朝服再拜齋于燕室學者問之先生曰必欲以所言感悟君父安得不敬人君其尊如天必須盡己之誠意吾言得入則天下䝉其利不能入則反之又安得不敬十三日詔促解論語四月九日乞免史舘并修日歴職事從之十四日再乞歸田里十七日又於經筵留身求去且曰士大夫不理會進退安用所學上曰待與卿在内宫觀先生力辭翌日上以諭恭知政事劉公大中曰尹焞學問淵源足為後學矜式班列中得老成人為之領䄂亦足以見朝廷氣象十八日除直徽猷閣主管萬夀觀依舊兼崇政殿說書凡三辭不允又乞致仕又不允二十日進呈所解論語五月四日詔賜緋衣銀魚復被㫖解孟子上曰楊時物故胡安國朱震又亡同學之人今無存者朕甚痛惜之趙鼎曰尹焞學問淵源可以繼震上曰震亦薦焞八月十三日詔先生講尚書冬講筵初開講好之者不如樂之者先生曰此安而有之上語中書舍人吕本中曰此尹焞受用處二十三日除試太常少卿兼職如故先生力辭不允十一月十六日先生以疾在告十九日除左通直郎權禮部侍郎時先生再已乞宫觀不允二十一日又除兼侍講凡十辭皆不允是時秦檜獨相力主和議金人遣張通古為詔諭江南使通古在舘浹旬朝議未定人情洶洶先生在病中力疾上䟽極諫以為不可墮金計陛下此膝一屈不可復伸反復千餘言又以書切責秦檜檜大怒書䟽並見文集九年己未正月除徽猷閣待制提舉萬夀觀仍兼侍講先生曰病不能朝而寵禄日至雖主上賢我大臣安我我何功徳以當之上表力陳當去之義有五檜見而益䘖之乃見上具言尹焞負天下重望凡所奏陳乞付中書詳酌行之先生又力辭乞歸田里遂差提舉江州太平觀待制如故十五日先生既得祠即離國門仍乞追還待制職名不允二十日至平江寓居虎邱西菴扁上方所居之室曰三畏齋時門人吕稽中吕堅中祁寛蔡仍蔡迨黄循聖徐正夫侍十月十七日有書伊川修褉帖䟦語十年庚申先生年七十正月十七日有題蘭亭碑軸後語先生曰吾無功而為從臣吾去而不能復辭七十而老尚矣遂上章乞致仕二十二日得㫖遷一官依所乞致仕時先生子壻程暐為桐廬令九月十五日先生自平江徃桐廬舘於縣齋二十五日有題桐廬縣齋詩十月初十日有題雜後語十二月子壻邢純為浙東撫屬遂迎侍先生徃會稽時門人吕稽中堅中虞仲琳祁寛從行十一年辛酉先生寓居會稽十二年壬戌三月晦日有題温公莊子節帖六月二十六日有答謝用休書十月先生病十一月初四日先生病革初五日先生卒年七十三上聞而悼惜之命特贈四官自奉議郎贈朝請郎徽猷閣待制依條與致仕遺表恩澤賜銀絹三百疋兩給塟事仍遣中使䕶其喪塟于會稽縣五雲鄊龍瑞宫山之原和靖集巻八
